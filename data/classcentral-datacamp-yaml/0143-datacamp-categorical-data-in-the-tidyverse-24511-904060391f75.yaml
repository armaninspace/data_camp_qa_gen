overview: |-
  Introduction to Factor Variables

  In this chapter, you’ll learn all about factors. You’ll discover the
  difference between categorical and ordinal variables, how R represents them,
  and how to inspect them to find the number and names of the levels. Finally,
  you’ll find how forcats, a tidyverse package, can improve your plots by
  letting you quickly reorder variables by their frequency.

  Manipulating Factor Variables

  You’ll continue to dive into the forcats package, learning how to change the
  order and names of levels and even collapse them into one another.

  Creating Factor Variables

  Having gotten a good grasp of forcats, you’ll expand out to the rest of the
  tidyverse, learning and reviewing functions from dplyr, tidyr, and stringr.
  You’ll refine graphs with ggplot2 by changing axes to percentage scales,
  editing the layout of the text, and more.

  Case Study on Flight Etiquette

  In this final chapter, you’ll take all that you’ve learned and apply it in a
  case study. You’ll learn more about working with strings and summarizing
  data, then replicate a publication quality 538 plot.
