overview: |-
  Probability Distributions

  Want to increase your odds of acing your job interview? If so, brush up on
  your knowledge of probability theory. In this chapter, we'll roll dice and
  shoot baskets to explain probabilities using real-life examples.

  Exploratory Data Analysis

  If the job description appeals to you review descriptive statistics before
  the interview. In this chapter, you will practice exploratory data analysis
  (EDA) using natural gas prices and data from a survey analysis.

  Statistical Tests

  March confidently into your job interview after reviewing confidence
  intervals. We'll review the t-test, ANOVA, and normality tests to prepare
  you for statistics-based coding questions.

  Regression Models

  Is your potential employer planning to test your R skills? Make sure you’re
  prepared and practice model evaluation beforehand. In this chapter, we will
  fit and evaluate linear and logistic regression models using various
  biomedical datasets. By the end of this chapter, you’ll be fully prepared to
  answer any question the interviewer throws your way!
