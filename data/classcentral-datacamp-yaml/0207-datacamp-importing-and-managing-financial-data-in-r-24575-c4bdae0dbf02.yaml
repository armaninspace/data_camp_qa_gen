overview: |-
  Introduction and Downloading Data

  A wealth of financial and economic data are available online. Learn how
  getSymbols() and Quandl() make it easy to access data from a variety of
  sources.

  Extracting and Transforming Data

  You've learned how to import data from online sources, now it's time to see
  how to extract columns from the imported data. After you've learned how to
  extract columns from a single object, you will explore how to import,
  transform, and extract data from multiple instruments.

  Managing Data from Multiple Sources

  Learn how to simplify and streamline your workflow by taking advantage of
  the ability to customize default arguments to getSymbols(). You will see how
  to customize defaults by data source, and then how to customize defaults by
  symbol. You will also learn how to handle problematic instrument symbols.

  Aligning Data with Different Periodicities

  You've learned how to import, extract, and transform data from multiple data
  sources. You often have to manipulate data from different sources in order
  to combine them into a single data set. First, you will learn how to convert
  sparse, irregular data into a regular series. Then you will review how to
  aggregate dense data to a lower frequency. Finally, you will learn how to
  handle issues with intra-day data.

  Importing Text Data, and Adjusting for Corporate Actions

  You've learned the core workflow of importing and manipulating financial
  data. Now you will see how to import data from text files of various
  formats. Then you will learn how to check data for weirdness and handle
  missing values. Finally, you will learn how to adjust stock prices for
  splits and dividends.
