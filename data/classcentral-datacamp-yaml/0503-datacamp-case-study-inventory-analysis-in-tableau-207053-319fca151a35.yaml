overview: |-
  Enhance your Tableau skills with this case study on inventory analysis.
  Analyze a dataset, create calculated fields, and create visualizations.

  Looking for a way to challenge what you have learned in Tableau? This case
  study can help you prepare to tackle real-world problems in the field of
  inventory analysis.

  Practice Your Tableau Skills With a Case Study

  You’ll analyze a dataset from a fictitious company named Acropolis Retail
  Inc. Many retailers want to investigate possible improvements in inventory
  management and purchases, but they need some help. Here is where you come to
  the rescue. But as you will see, in a real-world case, not everything is
  perfect.

  Clean and Explore Data With Tableau

  You will start by cleaning and exploring the data to verify everything makes
  sense. Next, you’ll create calculated fields and ensure there is the
  appropriate level of detail for analyzing the clean information to obtain
  focused insights. Finally, you’ll finish by creating attractive, informative
  visualizations and dashboards.

  By the time you’re finished, you’ll be more confident performing an
  inventory analysis using Tableau.
