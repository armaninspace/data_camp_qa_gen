overview: |-
  Data Connections in Power BI

  Whenever using Power BI, a data connection is required. In this chapter,
  you'll be introduced to commonly used data connections for Power BI. You'll
  also get an insight into the data connection features of Power BI Serice
  while finally having the chance to carry out your own database connection.

  Databases and More

  It's time to take the next step in your data connections journey! Through
  hands-on exercises, you will interact with a new database connection and
  learn how different settings can be changed. You'll also learn about the
  different storage modes offered by Power BI and how you can use coding to
  alter the import process.

  Data Source Settings

  In this chapter, you'll learn how to create parameters that can be used for
  incremental refreshes. You will also implement an incremental refresh on
  your data connection. Finally, you'll understand how M Language can be
  utilized to tackle issues with your data import processes.
