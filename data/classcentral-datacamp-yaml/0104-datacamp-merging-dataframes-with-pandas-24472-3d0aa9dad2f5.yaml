overview: |-
  Preparing data

  -In this chapter, you'll learn about different techniques you can use to
  import multiple files into DataFrames. Having imported your data into
  individual DataFrames, you'll then learn how to share information between
  DataFrames using their indexes. Understanding how indexes work is essential
  to merging DataFrames, which you’ll learn later in the course.

  Concatenating data

  -You'll learn how to perform database-style operations to combine
  DataFrames. In particular, you'll learn about appending and concatenating
  DataFrames while working with a variety of real-world datasets.

  Merging data

  -You'll learn all about merging pandas DataFrames. You'll explore different
  techniques for merging, and learn about left joins, right joins, inner
  joins, and outer joins, as well as when to use which. You'll also learn
  about ordered merging, which is useful when you want to merge DataFrames
  with columns that have natural orderings, like date-time columns.

  Case Study - Summer Olympics

  -To reinforce your new skills, you'll apply them to an in-depth case study
  using Olympic medal data. The analysis involves integrating your
  multi-DataFrame skills from this course and skills you've gained in previous
  pandas courses. This is a rich dataset that will allow you to fully leverage
  your pandas data manipulation skills.
