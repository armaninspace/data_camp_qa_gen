overview: |-
  The Basics of Statistical Hypothesis Testing

  In this chapter, you will learn how to explore your data and ask meaningful
  questions. Then, you will discover how to answer these question by using
  your first statistical hypothesis tests: the t-test, the Chi-Square test,
  the Fisher exact test, and the Pearson correlation test.

  Design Considerations in Experimental Design

  In this chapter, you will learn how to examine and multiple factors at once,
  controlling for the effect of confounding variables and examining
  interactions between variables. You will learn how to use randomization and
  blocking to build robust tests and how to use the powerful ANOVA method.

  Sample size, Power analysis, and Effect size

  In this chapter, you will focus on ways to avoid drawing false conclusions,
  whether false positives (type I errors) or false negatives (type II errors).
  Central to avoiding false negatives is understanding the interplay between
  sample size, power analysis, and effect size.

  Testing Normality: Parametric and Non-parametric Tests

  In this final chapter, you will examine the assumptions underlying
  statistical tests and learn about how that influences your experimental
  design. This will include learning whether a variable follows a normal
  distribution and when you should use non-parametric statistical tests like
  the Wilcoxon rank-sum test and the Spearman correlation test.
