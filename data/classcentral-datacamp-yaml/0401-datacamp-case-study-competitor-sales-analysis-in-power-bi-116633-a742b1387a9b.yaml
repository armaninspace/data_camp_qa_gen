overview: |-
  This Power BI case study follows a real-world business use case where you
  will apply the concepts of ETL and visualization.

  Apply Your Skills with a Power BI Case Study

  This Power BI case study follows a real-world business use case where you
  will apply the concepts of ETL and visualization.

  From Power Query to Power BI

  Through Power BI and Power Query Editor, you will work on the development of
  a complete Power BI report, starting from the data integration from multiple
  sources, data transformation, modeling, and then visualization.

  Carry Out Detailed Analysis

  You will carry out a sales and market share analysis, focusing not only on
  the company's performance internally, reflecting on how well the products
  sell, but also externally analyzing how well they are doing against
  competing manufacturers. Thus, business users can make informed decisions
  and actions on their data.

  By the end of this case study, you’ll have a stronger understanding of
  competitor sales analysis and have more confidence in using Power BI on your
  own datasets.
