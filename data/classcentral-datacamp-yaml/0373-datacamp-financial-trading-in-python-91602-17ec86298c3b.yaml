overview: |-
  Trading Basics

  What is financial trading, why do people trade, and what’s the difference
  between technical trading and value investing? This chapter answers all
  these questions and more. You’ll also learn useful tools to explore trading
  data, generate plots, and how to implement and backtest a simple trading
  strategy in Python.

  Technical Indicators

  Let's dive into the world of technical indicators—a useful tool for
  constructing trading signals and building strategies. You’ll get familiar
  with the three main indicator groups, including moving averages, ADX, RSI,
  and Bollinger Bands. By the end of this chapter, you’ll be able to
  calculate, plot, and understand the implications of indicators in Python.

  Trading Strategies

  You’re now ready to construct signals and use them to build trading
  strategies. You’ll get to know the two main styles of trading strategies:
  trend following and mean reversion. Working with real-life stock data,
  you’ll gain hands-on experience in implementing and backtesting these
  strategies and become more familiar with the concepts of strategy
  optimization and benchmarking.

  Performance Evaluation

  How is your trading strategy performing? Now it’s time to take a look at the
  detailed statistics of the strategy backtest result. You’ll gain knowledge
  of useful performance metrics, such as returns, drawdowns, Calmar ratio,
  Sharpe ratio, and Sortino ratio. You’ll then tie it all together by learning
  how to obtain these ratios from the backtest results and evaluate the
  strategy performance on a risk-adjusted basis.
