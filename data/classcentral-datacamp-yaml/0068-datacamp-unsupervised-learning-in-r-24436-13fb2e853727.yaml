overview: |-
  Unsupervised learning in R

  The k-means algorithm is one common approach to clustering. Learn how the
  algorithm works under the hood, implement k-means clustering in R, visualize
  and interpret the results, and select the number of clusters when it's not
  known ahead of time. By the end of the chapter, you'll have applied k-means
  clustering to a fun "real-world" dataset!

  Hierarchical clustering

  Hierarchical clustering is another popular method for clustering. The goal
  of this chapter is to go over how it works, how to use it, and how it
  compares to k-means clustering.

  Dimensionality reduction with PCA

  Principal component analysis, or PCA, is a common approach to dimensionality
  reduction. Learn exactly what PCA does, visualize the results of PCA with
  biplots and scree plots, and deal with practical issues such as centering
  and scaling the data before performing PCA.

  Putting it all together with a case study

  The goal of this chapter is to guide you through a complete analysis using
  the unsupervised learning techniques covered in the first three chapters.
  You'll extend what you've learned by combining PCA as a preprocessing step
  to clustering using data that consist of measurements of cell nuclei of
  human breast masses.
