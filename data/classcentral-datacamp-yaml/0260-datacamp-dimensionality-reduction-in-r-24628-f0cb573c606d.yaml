overview: |-
  Principal component analysis (PCA)

  -As a data scientist, you'll frequently have to deal with messy and
  high-dimensional datasets. In this chapter, you'll learn how to use
  Principal Component Analysis (PCA) to effectively reduce the dimensionality
  of such datasets so that it becomes easier to extract actionable insights
  from them.

  Advanced PCA & Non-negative matrix factorization (NNMF)

  -Here, you'll build on your knowledge of PCA by tackling more advanced
  applications, such as dealing with missing data. You'll also become familiar
  with another essential dimensionality reduction technique called
  Non-negative matrix factorization (NNMF) and how to use it in R.

  Exploratory factor analysis (EFA)

  -Become familiar with exploratory factor analysis (EFA), another
  dimensionality reduction technique that is a natural extension to PCA.

  Advanced EFA

  -Round out your mastery of dimensionality reduction in R by extending your
  knowledge of EFA to cover more advanced applications.
