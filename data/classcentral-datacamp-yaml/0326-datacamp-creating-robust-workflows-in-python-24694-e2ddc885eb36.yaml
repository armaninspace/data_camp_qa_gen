overview: |-
  Python Programming Principles

  -In this chapter, we will discuss three principles that guide decisions made
  by Python programmers. You will put these principles into practice in the
  coding exercises and throughout the rest of the course!

  Documentation and Tests

  -Documentation and tests are often overlooked, despite being essential to
  the success of all projects. In this chapter, you will learn how to include
  documentation in our code and practice Test-Driven Development (TDD), a
  process that puts tests first!

  Shell superpowers

  -Shell scripting is an essential part of any Python workflow. In this
  chapter, you will learn how to build command-line interfaces (CLIs) for
  Python programs and to automate common tasks related to version control,
  virtual environments, and Python packaging.

  Projects, pipelines, and parallelism

  -In the final chapter of this course, you will learn how to facilitate and
  standardize project setup using project templates. You will also consider
  the benefits of zipped executable projects, Jupyter notebooks
  parameterization, and parallel computing.
