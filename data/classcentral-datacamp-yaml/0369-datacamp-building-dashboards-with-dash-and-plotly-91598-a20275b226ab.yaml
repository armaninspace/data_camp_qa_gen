overview: |-
  From Plotly to Dash

  Take Plotly to the next level with Dash. After briefly revising Plotly,
  you'll dive straight into building your first Dash app. You'll then get your
  first taste of HTML and how Dash harnesses this vital web development
  language to structure larger Dash apps. Finally, you'll put all this
  together in your first multi-graph dashboard for a global e-commerce
  organization.

  Styling Dash Apps

  Take control of the elements in your Dash apps with HTML and CSS. Learn what
  each of these is and how they are at the core of modern web development,
  then incorporate their powerful abilities in your Dash apps to change the
  size, color, and placement of your objects.

  Interactivity with Callbacks and Components

  Turn your Dash apps into user-driven experiences by mastering interactive
  components. Learn how to include dropdowns, date pickers, and event free
  text fields to modify elements on your Dash apps and build truly
  self-service dashboards your users can explore.

  Advanced Dash Apps

  Unleash the full power of Dash app interactivity by triggering changes to
  one graph when a user clicks on or hovers over, another graph. Additionally,
  you'll learn the basics of Dash's AG Grid module for creating tables that
  can be easily filtered, sorted, and paginated; as well as trigger changes in
  other graphs as well.
