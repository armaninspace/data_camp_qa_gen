overview: |-
  Machine Learning with tidymodels

  In this chapter, you’ll explore the rich ecosystem of R packages that power
  tidymodels and learn how they can streamline your machine learning
  workflows. You’ll then put your tidymodels skills to the test by predicting
  house sale prices in Seattle, Washington.

  Classification Models

  Learn how to predict categorical outcomes by training classification models.
  Using the skills you’ve gained so far, you’ll predict the likelihood of
  customers canceling their service with a telecommunications company.

  Feature Engineering

  Find out how to bake feature engineering pipelines with the recipes package.
  You’ll prepare numeric and categorical data to help machine learning
  algorithms optimize your predictions.

  Workflows and Hyperparameter Tuning

  Now it’s time to streamline the modeling process using workflows and
  fine-tune models with cross-validation and hyperparameter tuning. You’ll
  learn how to tune a decision tree classification model to predict whether a
  bank's customers are likely to default on their loan.
