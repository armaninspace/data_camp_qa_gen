overview: |-
  Accompanied at every step with hands-on practice queries, this course
  teaches you everything you need to know to analyze data using your own SQL
  code today!

  SQL is widely recognized as the most popular language for turning raw data
  stored in a database into actionable insights. This course uses a films
  database to teach how to navigate and extract insights from the data using
  SQL.

  Discover Filtering with SQL

  You'll discover techniques for filtering and comparing data, enabling you to
  extract specific information to gain insights and answer questions about the
  data.

  Get Acquainted with Aggregation

  Next, you'll get a taste of aggregate functions, essential for summarizing
  data effectively and gaining valuable insights from large datasets. You'll
  also combine this with sorting and grouping data, adding another layer of
  meaning to your insights and analysis.

  Write Clean Queries

  Finally, you'll be shown some tips and best practices for presenting your
  data and queries neatly. Throughout the course, you'll have hands-on
  practice queries to solidify your understanding of the concepts. By the end
  of the course, you'll have everything you need to know to analyze data using
  your own SQL code today!
syllabus:
  - title: "Selecting Data"
    summary: |-
      In this first chapter, you’ll learn how to query a films database
      and select the data needed to answer questions about the movies and
      actors. You'll also understand how SQL code is executed and
      formatted.
  - title: "Filtering Records"
    summary: |-
      Learn about how you can filter numerical and textual data with SQL.
      Filtering is an important use for this language. You’ll learn how to
      use new keywords and operators to help you narrow down your query to
      get results that meet your desired criteria and gain a better
      understanding of NULL values and how to handle them.
  - title: "Aggregate Functions"
    summary: |-
      SQL allows you to zoom in and out to better understand an entire
      dataset, its subsets, and its individual records. You'll learn to
      summarize data using aggregate functions and perform basic
      arithmetic calculations inside queries to gain insights into what
      makes a successful film.
  - title: "Sorting and Grouping"
    summary: |-
      This final chapter teaches you how to sort and group data. These
      skills will take your analyses to a new level by helping you uncover
      critical business insights and identify trends and performance.
      You'll get hands-on experience to determine which films performed
      the best and how movie durations and budgets changed over time.
