overview: |-
  Start your journey developing AI-powered applications with the OpenAI API.
  Learn about the functionality that underpins popular AI applications like
  ChatGPT.

  Discover How to Access AI Models from the OpenAI API

  Over recent years, OpenAI has emerged as a market leader in creating AI
  models, such as GPT-4o, and releasing them to the wider community through
  applications like ChatGPT. These models can transform not only the way you
  work but also the products and services that businesses provide to
  customers.

  To begin extracting business value from OpenAI's models, you'll need to
  learn to work with their Application Programming Interface, or API.
  Throughout the course, you'll learn to use Python code to send requests to
  use OpenAI's models.

  Solve Real-World Problems Using AI Models

  The AI models accessible through the OpenAI API have a wide range of
  potential applications. In this course, you'll use AI to generate and
  transform text content, perform sentiment analysis, and categorization.

  Begin Developing AI Applications

  As AI becomes more accessible to individuals and organizations, the bar for
  developing AI-driven product features and automations continues to fall.
  Right now, every organization has the capability to begin using AI to
  streamline business processes and develop more personalized customer
  experiences. The OpenAI API provides easy access for software engineers and
  developers to start integrating AI into new applications and systems.
