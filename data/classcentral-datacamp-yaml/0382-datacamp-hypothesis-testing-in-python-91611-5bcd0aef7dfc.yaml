overview: |-
  Learn how and when to use common hypothesis tests like t-tests, proportion
  tests, and chi-square tests in Python.

  Hypothesis testing lets you answer questions about your datasets in a
  statistically rigorous way. In this course, you'll grow your Python
  analytical skills as you learn how and when to use common tests like
  t-tests, proportion tests, and chi-square tests. Working with real-world
  data, including Stack Overflow user feedback and supply-chain data for
  medical supply shipments, you'll gain a deep understanding of how these
  tests work and the key assumptions that underpin them. You'll also discover
  how non-parametric tests can be used to go beyond the limitations of
  traditional hypothesis tests.

  The videos contain live transcripts you can reveal by clicking "Show
  transcript" at the bottom left of the videos.

  The course glossary can be found on the right in the resources section.

  To obtain CPE credits you need to complete the course and reach a score of
  70% on the qualified assessment. You can navigate to the assessment by
  clicking on the CPE credits callout on the right.
syllabus:
  - title: "Hypothesis Testing Fundamentals"
    summary: |-
      How does hypothesis testing work and what problems can it solve? To
      find out, you’ll walk through the workflow for a one sample
      proportion test. In doing so, you'll encounter important concepts
      like z-scores, p-values, and false negative and false positive
      errors.
  - title: "Two-Sample and ANOVA Tests"
    summary: |-
      In this chapter, you’ll learn how to test for differences in means
      between two groups using t-tests and extend this to more than two
      groups using ANOVA and pairwise t-tests.
  - title: "Proportion Tests"
    summary: |-
      Now it’s time to test for differences in proportions between two
      groups using proportion tests. Through hands-on exercises, you’ll
      extend your proportion tests to more than two groups with chi-square
      independence tests, and return to the one sample case with
      chi-square goodness of fit tests.
  - title: "Non-Parametric Tests"
    summary: |-
      Finally, it’s time to learn about the assumptions made by parametric
      hypothesis tests, and see how non-parametric tests can be used when
      those assumptions aren't met.
