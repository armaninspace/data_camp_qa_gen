overview: |-
  Decennial Census of Population and Housing

  Start exploring Census data products with the Decennial Census. Use the
  Census API and the requests package to retrieve data, load into pandas data
  frames, and conduct exploratory visualization in seaborn. Learn about
  important Census geographies, including states, counties, and tracts.

  American Community Survey

  Explore topics such as health insurance coverage and gentrification using
  the American Community Survey. Calculate Margins of Error and explore change
  over time. Create choropleth maps using geopandas.

  Measuring Segregation

  Explore racial segregation in America. Calculate the Index of Dissimilarity,
  and important measure of segregation. Learn about and use Metropolitan
  Statistical Areas, and important geography for urban research. Study
  segregation changes over time in Chicago.

  Exploring Census Topics

  In this chapter, you will apply what you have learned to four topical
  studies. Explore unemployment by race and ethnicity; commuting patterns and
  worker density; immigration and state-to-state population flows; and rent
  burden in San Francisco.
