overview: |-
  Machine learning and data use cases

  Machine learning is used in many different industries and fields. It can
  fundamentally improve the business if applied correctly. This chapter
  outlines machine learning use cases, job roles and how they fit in the data
  needs pyramid.

  Machine learning types

  This chapter overviews different machine learning types. We will look into
  differences between causal and prediction models, explore supervised and
  unsupervised learning, and finally understand the sub-types of supervised
  learning: classification and regression.

  Business requirements and model design

  This chapter reviews key steps in scoping out business requirements,
  identifying and sizing machine learning opportunities, assessing the model
  performance, and identifying any performance risks in the process.

  Managing machine learning projects

  This chapter will look into the best and worst practices of managing machine
  learning projects. We will identify most common machine learning mistakes,
  learn how to manage communication between the business and ML teams and
  finally address the challenges when deploying machine learning models to
  production.
