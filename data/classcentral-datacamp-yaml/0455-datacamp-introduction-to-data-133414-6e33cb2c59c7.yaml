overview: |-
  Gain an introduction to data in this hands-on course. Learn the basics of
  data types and structures, the DIKW framework, data ethics and more.

  Gain an Introduction to Data

  In this course, you'll dive into the exciting and growing world of data and
  learn how to use it to make smart decisions as it becomes increasingly
  important to know at least the basics.

  You'll start by exploring the basics of data, including data types and data
  structures and how valuable data can be in decision-making. You'll also
  learn about the growing data bubble and how it's changing the world.

  You'll learn about the DIKW framework, which is a framework that describes
  the relationship between data, information, knowledge, and wisdom.

  Go Beyond the Data Basics

  The last part of this course will cover some more advanced topics in data.
  You'll begin with a discussion of data ethics, including data privacy. Next,
  you'll learn about the data life cycle framework, which describes the steps
  involved in working with data. Finally, you'll learn about common data
  mistakes and how to avoid them.

  By the end of this course, you'll have a solid understanding of the concepts
  and principles of data and how it is used to make smart decisions, as well
  as some best practices in data handling. The course will be hands-on, with a
  mix of videos and interactive exercises to help you build practical skills
  you can apply in your field.

  Introduction to Data is the ideal course for everyone looking to gain a
  broad understanding of data.
