overview: |-
  Temporal EDA, Variables & Date Manipulation

  Learn how to do effective exploratory data analysis on temporal data, create
  scalar and table variables to store data, and learn how to execute date
  manipulation. This chapter will also cover the following SQL functions:
  DATEDIFF( ), DATENAME( ), DATEPART( ), CAST( ), CONVERT( ), GETDATE( ), and
  DATEADD( ).

  User Defined Functions

  This chapter will explain how to create, update, and execute user-defined
  functions (UDFs). You will learn about the various types of UDFs: scalar,
  inline, and multi-statement table-valued. You’ll also learn best practices.

  Stored Procedures

  Learn how to create, update, and execute stored procedures. Investigate the
  differences between stored procedures and user defined functions, including
  appropriate scenarios for each.

  NYC Taxi Ride Case Study

  Apply your new skills in temporal EDA, user-defined functions, and stored
  procedures to solve a business case problem. Analyze the New York City taxi
  ride dataset to identify average fare per distance, ride count, and total
  ride time for each borough on each day of the week. And which pickup
  locations within the borough should be scheduled for each driver shift?
