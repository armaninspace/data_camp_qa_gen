overview: |-
  Introduction to HTML

  Learn the structure of HTML. We begin by explaining why web scraping can be
  a valuable addition to your data science toolbox and then delving into some
  basics of HTML. We end the chapter by giving a brief introduction on XPath
  notation, which is used to navigate the elements within HTML code.

  XPaths and Selectors

  Leverage XPath syntax to explore scrapy selectors. Both of these concepts
  will move you towards being able to scrape an HTML document.

  CSS Locators, Chaining, and Responses

  Learn CSS Locator syntax and begin playing with the idea of chaining
  together CSS Locators with XPath. We also introduce Response objects, which
  behave like Selectors but give us extra tools to mobilize our scraping
  efforts across multiple websites.

  Spiders

  Learn to create web crawlers with scrapy. These scrapy spiders will crawl
  the web through multiple pages, following links to scrape each of those
  pages automatically according to the procedures we've learned in the
  previous chapters.
