overview: |-
  Accessing IoT Data

  In this chapter, you will first understand what IoT data is.

  Then, you learn how to aquire IoT data through a REST API and using an MQTT
  data stream to collect data in real time.

  Processing IoT Data

  In the second chapter, you will look at the data you gathered during the
  first chapter. You will visualize the data and learn the importance of
  timestamps when dealing with data streams. You will also implement caching
  to an MQTT data stream.

  Analyzing IoT Data

  In this chapter, you will combine multiple datasoures with different time
  intervals.

  You will then analyze the data to detect correlations, outliers and trends.

  Machine Learning for IoT

  In this final chapter, you will use the data you analyzed during the
  previous chapters to build a machine learning pipeline. You will then learn
  how to implement this pipeline into a data stream to make realtime
  predictions.
