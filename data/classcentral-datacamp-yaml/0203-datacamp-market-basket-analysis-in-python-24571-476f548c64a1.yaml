overview: |-
  Introduction to Market Basket Analysis

  In this chapter, you’ll learn the basics of Market Basket Analysis:
  association rules, metrics, and pruning. You’ll then apply these concepts to
  help a small grocery store improve its promotional and product placement
  efforts.

  Association Rules

  Association rules tell us that two or more items are related. Metrics allow
  us to quantify the usefulness of those relationships. In this chapter,
  you’ll apply six metrics to evaluate association rules: supply, confidence,
  lift, conviction, leverage, and Zhang's metric. You’ll then use association
  rules and metrics to assist a library and an e-book seller.

  Aggregation and Pruning

  The fundamental problem of Market Basket Analysis is determining how to
  translate vast amounts of customer decisions into a small number of useful
  rules. This process typically starts with the application of the Apriori
  algorithm and involves the use of additional strategies, such as pruning and
  aggregation. In this chapter, you’ll learn how to use these methods and will
  ultimately apply them in exercises where you assist a retailer in selecting
  a physical store layout and performing product cross-promotions.

  Visualizing Rules

  In this final chapter, you’ll learn how visualizations are used to guide the
  pruning process and summarize final results, which will typically take the
  form of itemsets or rules. You’ll master the three most useful
  visualizations -- heatmaps, scatterplots, and parallel coordinates plots –
  and will apply them to assist a movie streaming service.
