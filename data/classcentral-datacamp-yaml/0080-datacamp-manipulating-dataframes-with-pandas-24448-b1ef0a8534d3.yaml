overview: |-
  Extracting and transforming data

  -In this chapter, you will learn how to index, slice, filter, and transform
  DataFrames using a variety of datasets, ranging from 2012 US election data
  for the state of Pennsylvania to Pittsburgh weather data.

  Advanced indexing

  -Having learned the fundamentals of working with DataFrames, you will now
  move on to more advanced indexing techniques. You will learn about
  MultiIndexes, or hierarchical indexes, and learn how to interact with and
  extract data from them.

  Rearranging and reshaping data

  -Here, you will learn how to reshape your DataFrames using techniques such
  as pivoting, melting, stacking, and unstacking. These are powerful
  techniques that allow you to tidy and rearrange your data into the optimal
  format for data analysis.

  Grouping data

  -In this chapter, you'll learn how to identify and split DataFrames by
  groups or categories for further aggregation or analysis. You'll also learn
  how to transform and filter your data, and how to detect outliers and impute
  missing values. Knowing how to effectively group data in pandas can be a
  seriously powerful addition to your data science toolbox.

  Bringing it all together

  -We’ll bring together everything you have learned in this course while
  working with data recorded from the Summer Olympic games that goes as far
  back as 1896! This is a rich dataset that will allow you to fully apply the
  data manipulation techniques you have learned. You will pivot, unstack,
  group, slice, and reshape your data as you explore this dataset and uncover
  some truly fascinating insights.
