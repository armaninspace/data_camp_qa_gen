overview: |-
  Differential Expression Analysis

  To begin, you'll review the goals of differential expression analysis,
  manage gene expression data using R and Bioconductor, and run your first
  differential expression analysis with limma.

  Flexible Models for Common Study Designs

  In this chapter, you'll learn how to construct linear models to test for
  differential expression for common experimental designs.

  Pre- and post-processing

  Now that you've learned how to perform differential expression tests, next
  you'll learn how to normalize and filter the feature data, check for
  technical batch effects, and assess the results.

  Case Study: Effect of Doxorubicin Treatment

  In this final chapter, you'll use your new skills to perform an end-to-end
  differential expression analysis of a study that uses a factorial design to
  assess the impact of the cancer drug doxorubicin on the hearts of mice with
  different genetic backgrounds.
