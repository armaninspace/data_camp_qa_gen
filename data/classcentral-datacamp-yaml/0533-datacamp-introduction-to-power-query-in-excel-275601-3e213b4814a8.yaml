overview: |-
  Explore Excel Power Query for advanced data transformation and cleansing to
  boost your decision-making and analysis.

  Navigating Data with Excel Power Query

  Embark on a transformative journey through Excel Power Query, where data
  manipulation becomes an art. Designed for novices and experts alike, this
  course unlocks new efficiencies in data handling, leaving behind
  time-consuming manual processes. Discover the power to connect with varied
  data sources, streamline your datasets, and ready them for insightful
  analysis. Excel Power Query's suite of tools awaits to elevate your
  reporting and decision-making prowess, saving time and revealing valuable
  insights from your data.

  Discovering Power Query in Excel

  Begin with a comprehensive overview of Power Query, transforming Excel into
  a potent data analysis tool. Learn to import and systematically organize
  data with intuitive commands, tracking each step with precision. This
  foundational knowledge sets the stage for sophisticated data manipulation
  within the familiar Excel workspace.

  Cleansing Data for Clarity

  Dive into Power Query's cleaning features to produce immaculate datasets.
  Tackle errors, fill gaps in data, and eradicate duplicates. This chapter
  hones your skills in data refinement, ensuring your dataset's integrity and
  priming it for complex analysis.

  The Art of Data Transformation

  Conclude with a deep dive into data transformation techniques. Master the
  essentials of column transformations, including numerical, date/time, and
  text adjustments, leveraging Power Query's built-in functions. Experience
  advanced structuring methods like transposing, pivoting, and grouping, and
  learn to interlink queries for a comprehensive analytical narrative.

  This condensed course promises a hands-on approach to mastering data
  efficiency and insight extraction with Excel Power Query, empowering you to
  become a savvy data analyst.
syllabus:
  - title: "Getting Started with Power Query in Excel"
    summary: |-
      Imagine Excel as you've never seen it before – Power Query opens a
      window to a whole new world of data possibilities! In this chapter,
      you’ll explore the layout and features of Power Query and its
      interplay with traditional Excel workbooks. You’ll load data from
      multiple sources and learn to structure them through column and row
      manipulations while maintaining an applied steps log of all your
      actions.
  - title: "Data Cleaning and Preparation"
    summary: |-
      In this chapter, you’ll harness Power Query’s digital cleaning
      features to prepare a squeaky-clean dataset! Column profiling
      features will be covered, allowing you to handle errors and missing
      data effectively. You’ll also master eliminating duplicate data and
      correcting for data entry issues and outliers.
  - title: "Column Transformations"
    summary: |-
      It’s time to transform! This chapter covers many basic column
      transformations - a vital step in the journey from raw data to
      meaningful insights. You will learn how and when to apply numeric,
      date/time, and text transformations to both transform and derive
      column contents with Excel Power Query’s many built-in features.
  - title: "Shaping and Grouping Data"
    summary: |-
      It’s all about shaping and grouping in this final chapter! You will
      get hands-on experience with powerful transformation options to
      bring your analysis prep to the next level. You’ll learn how and
      when to apply transpose, pivot, and group-by transformations - all
      within the Power Query editor. You’ll also learn how to leverage
      existing queries to build new ones and track their connection in the
      Query Dependencies tree.
