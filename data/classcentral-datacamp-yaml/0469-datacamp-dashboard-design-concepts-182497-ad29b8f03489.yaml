overview: |-
  Learn the skills needed to create impactful dashboards. Understand dashboard
  design fundamentals, visual analytics components, and dashboard types.

  Learn the Fundamentals of Dashboard Design

  Dashboard Design Concepts is a comprehensive course designed for data-driven
  individuals who want to learn how to turn data into insights and impact the
  decision-making process.

  Learn to Design the Perfect Dashboard

  You will become familiar with the fundamentals of dashboard design,
  including how to choose the right performance metrics, use data
  visualization to effectively communicate insights, and design dashboards
  that drive business success.

  Whether you are new to dashboard design or looking to improve your existing
  skills, this course will provide you with the knowledge and skills you need
  to create impactful and effective dashboards.

  Create Dashboards That Make an Impact

  You’ll start this course by covering some of the foundations of dashboard
  design, including the structure and key measurements to consider when
  building dashboards.

  As you progress, you’ll explore some of the principles of visual analytics,
  giving you the knowledge you need to improve your dashboards through data
  quality and metadata.

  After covering dashboard taxonomies, you’ll finish the course by learning
  about dashboard software and how to measure the performance of the
  dashboards you create.
