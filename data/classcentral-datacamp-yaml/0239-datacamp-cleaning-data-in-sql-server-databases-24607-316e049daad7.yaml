overview: |-
  Starting with Cleaning Data

  To begin the course, you will learn why cleaning data is important. You will
  solve simple problems such as leading and trailing spaces in strings,
  unifying formats for flight registrations, combining strings and more.

  Dealing with missing data, duplicate data, and different date formats

  In this chapter, you will deepen your data cleaning knowledge. You will
  learn how to deal with missing data, avoid duplicate data in your datasets,
  and work with different formats of dates.

  Dealing with out of range values, different data types, and pattern matching

  In this chapter, you will deal with out of range values and inaccurate data.
  You will also practice converting data with different types. Finally, you
  will work on matching patterns to your data to find outliers.

  Combining, splitting, and transforming data

  In this final chapter, you will learn how to combine and aggregate data of
  some columns into one, split data of one column into more columns, and
  transform rows into columns and vice versa.
