overview: |-
  Learn how to analyze survey data with Python and discover when it is
  appropriate to apply statistical tools that are descriptive and inferential
  in nature.

  Learn How to Use Python on Survey Data

  Whether it is a company looking to understand its employees’ work
  preferences or a marketing campaign wanting to know how to best cater to its
  dominant audience, survey data is one of the best tools used to better
  understand a population and how to proceed on a matter. Here, you’ll learn
  the purpose of analyzing survey data and when it is appropriate to apply
  statistical tools that are descriptive and inferential in nature.

  Get Familiar with Key Statistical Survey Analysis Tools

  Building on topics covered in Hypothesis Testing in Python, this hands-on
  course allows you to become familiar with using Python to analyze all sorts
  of survey data.

  You will learn to apply various sampling methods, ensuring that you
  accurately represent the population in a study and can infer their effects
  on the conclusion from your analysis.

  As you visualize your survey results, you’ll also qualitatively interpret
  the variables and results associated with modeling tests such as linear
  regression, the two-sample t-test, and the chi-square test, as it pertains
  to the type of survey you’re analyzing.
syllabus:
  - title: "Why Analyze Survey Data & When to Apply Statistical Tools"
    summary: |-
      What is survey data, and how do we determine which statistical test
      to use to analyze the data? To answer this, you’ll be able to define
      all sorts of survey data types, encounter important concepts like
      descriptive and inferential statistics, and visualize survey data to
      determine the appropriate statistical modeling technique needed. In
      doing so, you will know how to best qualitatively and quantitatively
      define the trends and insights you come across in surveys.
  - title: "Sampling and Weighting"
    summary: |-
      In this chapter, you’ll learn the different ways of creating sample
      survey data out of population survey data by analyzing the
      parameters by which the survey data was taken.
  - title: "Descriptive & Inferential Statistics"
    summary: |-
      Now it’s time to understand the difference between descriptive and
      inferential statistics concerning survey data analysis with some
      real-life examples. Through hands-on exercises, you’ll further
      interpret the meaning of different variables, key measures such as
      central tendency and zscore, and interpret results for actionable
      steps.
  - title: "Statistical Modeling"
    summary: |-
      Last but not least, it’s time to apply statistical modeling to
      survey data analysis with regression analysis, the two-sample
      t-test, chi-square test, and interpret the assumptions associated
      with these tests.
