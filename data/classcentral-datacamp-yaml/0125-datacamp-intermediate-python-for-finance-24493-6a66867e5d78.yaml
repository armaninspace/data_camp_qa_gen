overview: |-
  Datetimes and Dictionaries

  In this chapter, you’ll learn how to create and manipulate Python datetime
  objects to help you identify key financial events, such as Black Friday.
  You’ll also learn how to store and efficiently look up items using Python
  dictionaries.

  Control Flow and Logic

  Through hands-on activities, you’ll discover how to use Boolean logic to
  determine truth and use comparison and equality operators to control
  execution in if-statements and loops.

  Pandas Dataframe

  Discover how to create and access DataFrames with pandas using financial
  data from other data structures, including Dicts, lists, and CSV files.
  You’ll then uncover additional insights, as you aggregate data across rows
  or columns, calculate averages, and extend your data using functions.

  Working with NASDAQ Stock Data

  In this final chapter, you’ll try your hand at working with real-world
  NASDAQ stock data as you learn how to interpret new data, create masks to
  filter data, and visualize your findings with plots.
