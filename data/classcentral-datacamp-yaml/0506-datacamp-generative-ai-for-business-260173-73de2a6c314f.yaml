overview: |-
  Learn the role Generative Artificial Intelligence plays today and will play
  in the future in a business environment.

  Introduction to Generative AI

  Firstly, you'll learn about generative AI and how it differs from
  traditional AI. You will dive deeper into the generative AI ecosystem and
  its key players: universities, governments, companies, and open-source
  communities. You'll discover the impact of the cloud and discuss various
  model breakthroughs. This will give you a better understanding of how we got
  to this huge technological breakthrough.

  Generative AI Solutions

  Consecutively, you'll learn how to use Generative AI to enhance workflows.
  You'll investigate how to use it through augmentation, co-creation, and
  replacement techniques. You'll discover generative AI's value to daily
  operations and strategic decisions. Finally, you'll dive into responsible AI
  and how to prepare and lead in a future with Generative AI through strategic
  alignment, change management and continuous improvement.
