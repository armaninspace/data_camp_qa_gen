overview: |-
  Explore data structures such as linked lists, stacks, queues, hash tables,
  and graphs; and search and sort algorithms!

  Recognize Popular Data Structures and Algorithms

  Most computer programs are based on a few data structures and algorithms.
  Learn about what’s behind the hood of most of your computer interactions in
  this four-hour course! You’ll familiarize yourself with some of the most
  common data structures: linked lists, stacks, queues, and trees. You’ll also
  implement popular algorithms, such as Depth First Search, Breadth First
  Search, Bubble sort, Merge sort, and Quicksort.

  Learn to Spot Data Structures and Algorithms in Everyday Life

  You'll practice applying data structures and algorithms to decks of cards,
  music playlists, international dishes, and stacks of books. You’ll walk away
  with the ability to recognize common data structures and algorithms, and
  implement them in day-to-day applications!

  Analyze the Efficiency of Algorithms

  Along the way, you’ll stop to analyze popular algorithms in terms of their
  efficiency. You’ll come to grips with “Big O Notation”, the industry
  standard for describing the complexity of an algorithm.

  Sharpen Your Python Programming Knowledge

  Being well-versed with data structures and algorithms means being able to
  take everyday problems and solve them using efficient code. You’ll be
  practising this in Python, you’ll take these fundamental and transferable
  skills with you to any programming language.
