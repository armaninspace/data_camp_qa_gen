overview: |-
  Valuation of Cash Flows

  Learn the basics of cash flow vectors and their valuation with discount
  factors. You will then evaluate investments based on their net present value
  and build your own mortgage calculator. Finally, you will learn about fixed
  and variable interest rates; and annual and monthly rates.

  Life Tables

  Life tables play a vital role in life insurance products. In this chapter
  you will work with data sets from the Human Mortality Database by building
  meaningful visualizations to study the evolution of mortality data over age
  and time. You will also use survival and death probabilities.

  Life Annuities

  You will now act as an actuary working in a life insurance company. Learn
  about the basics of life annuity products and their valuation by working on
  cases ranging from simple life annuities to retirement plans.

  Life Insurances

  You will now deal with life insurance contracts. Learn how these products
  are relevant in your financial planning by designing whole life, temporary
  and endowment insurances.
