overview: |-
  Gain an introduction to Docker and discover its importance in the data
  professional’s toolkit. Learn about Docker containers, images, and more.

  Docker is a tool used to develop, run, and ship containers. It’s an
  essential part of every data professional’s toolbelt, helping to create
  robust, secure, and scalable applications or workflows.

  In this course, you’ll become a Docker pro, gaining hands-on experience
  using Docker CLI.

  Learn the Docker basics and understand how to create and manage containers
  using Dockerfiles and instructions. You’ll learn the Docker terminology and
  get hands-on experience with Docker commands using the Docker Command Line
  Interface.

  As you progress, you’ll learn how to create and manage Docker containers
  using Dockerfiles and Dockerfile instructions. To wrap up, you’ll learn
  Docker image security best practices to make your images safe and secure.

  The videos contain live transcripts you can reveal by clicking "Show
  transcript" at the bottom left of the videos.

  The course glossary can be found on the right in the resources section.

  To obtain CPE credits you need to complete the course and reach a score of
  70% on the qualified assessment. You can navigate to the assessment by
  clicking on the CPE credits callout on the right.
syllabus:
  - title: "Using Docker Containers"
    summary: |-
      You'll go from starting and stopping your first container to seeing
      how to clean your environment by removing all containers and images.
      You'll see how to debug issues by running commands inside a
      container or executing bash commands in a container interactively.
      All of this is done using the Docker Command Line Interface.
  - title: "Writing Your Own Docker Images"
    summary: |-
      Once you are able to manage images and containers, it's time to know
      how to share images with colleagues or your entire company and to
      understand how to create your own. Now, you'll build your own images
      using Dockerfiles. Dockerfiles are text files that include
      everything needed for Docker to build an image. You'll learn how to
      create images and will get an introduction to all the essential
      Dockerfile instructions like FROM, RUN, COPY, and more. By the end
      of this chapter, you'll have insight into how Docker makes images
      and be able to create optimized Docker images from scratch.
  - title: "Creating Secure Docker Images"
    summary: |-
      In this final chapter, you’ll focus on making your Dockerfiles
      configurable and secure. You'll learn how to make your Dockerfiles
      configurable using the ARG and ENV instructions. You’ll see why
      changing the user in your images makes them more secure and how to
      use the USER Dockerfile instruction to do so. To wrap things up,
      you’ll learn about some essential security best practices when
      creating Docker Images.
