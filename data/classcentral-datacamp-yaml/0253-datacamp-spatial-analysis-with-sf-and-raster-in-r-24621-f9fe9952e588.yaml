overview: |-
  Analyze spatial data using the sf and raster packages.

  There has never been a better time to use R for spatial analysis! The sf
  package has made working with vector data in R a breeze and the raster
  package provides a set of powerful and intuitive tools to work gridded data
  like satellite imagery. Instead of the painful process of performing your
  spatial analysis in GIS systems like ArcGIS or QGIS and then shuffling your
  results into another system for analysis, you can move your entire spatial
  analysis workflow into R. In this course you will learn why the sf package
  is rapidly taking over spatial analysis in R. You will read in spatial data,
  manipulate vectors using the dplyr package and learn how to work with
  coordinate reference systems. You'll also learn how to perform geoprocessing
  of vectors including buffering, spatial joins, computing intersections,
  simplifying and measuring distance. With rasters, you will aggregate,
  reclassify, crop, mask, and extract. The last chapter of the course is
  devoted to showing you how to make maps in R with the ggplot2 and tmap
  packages and performing a fun mini-analysis that brings together all your
  new skills.
