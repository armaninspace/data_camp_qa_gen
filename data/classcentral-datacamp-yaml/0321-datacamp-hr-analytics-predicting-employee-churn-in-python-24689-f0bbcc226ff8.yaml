overview: |-
  Introduction to HR Analytics

  In this chapter you will learn about the problems addressed by HR analytics,
  as well as will explore a sample HR dataset that will further be analyzed.
  You will describe and visualize some of the key variables, transform and
  manipulate the dataset to make it ready for analytics.

  Predicting employee turnover

  This chapter introduces one of the most popular classification techniques:
  the Decision Tree. You will use it to develop an algorithm that predicts
  employee turnover.

  Evaluating the turnover prediction model

  Here, you will learn how to evaluate a model and understand how "good" it
  is. You will compare different trees to choose the best among them.

  Choosing the best turnover prediction model

  In this final chapter, you will learn how to use cross-validation to avoid
  overfitting the training data. You will also learn how to know which
  features are impactful, and which are negligible. Finally, you will use
  these newly acquired skills to build a better performing Decision Tree!
