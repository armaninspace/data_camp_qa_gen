overview: |-
  Start to Calculate!

  We will begin our journey through Tableau calculations with a concept of
  calculated fields and we will revisit the foundations of various types of
  calculations, such as row-level and aggregations.

  We will also learn how to troubleshoot typical calculations errors and, in
  the second part of this chapter, we will study useful String and Logical
  functions which are indispensable in any data analysis.

  Level of Detail Expressions

  In this chapter we will explore the navigation between various levels of
  data granularity. With LOD expressions we will learn how to perform
  calculations independent of the dimensions in the view. Prepare to discover
  a whole new world of analytical possibilities that will help you get beyond
  the obvious insights!

  Table Calculations and Parameters

  In this chapter, we will zoom in on another useful type of calculations:
  Table calculations. We will learn how to calculate running totals,
  percentages of category, and ranking and discover ins and outs of underlying
  functions. In the second part of this chapter, we will uncover the
  parameters and learn how to use them in calculations. Let's go!

  Time Series Analysis

  In this chapter, we will work on time series analysis, but before we do so,
  we will focus on date and time data types as the critical components of all
  relevant time series calculations. Learning the key date functions will
  empower us to progress towards more complex analysis such as computing CAGR,
  Year over year calculations, and exploring seasonality trends or indexed
  growths. Knowledge from all the preceding chapters will come in handy.
