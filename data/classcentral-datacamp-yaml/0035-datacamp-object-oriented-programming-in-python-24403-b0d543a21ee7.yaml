overview: |-
  OOP Fundamentals

  In this chapter, you'll learn what object-oriented programming (OOP) is, how
  it differs from procedural-programming, and how it can be applied. You'll
  then define your own classes, and learn how to create methods, attributes,
  and constructors.

  Inheritance and Polymorphism

  Inheritance and polymorphism are the core concepts of OOP that enable
  efficient and consistent code reuse. Learn how to inherit from a class,
  customize and redefine methods, and review the differences between
  class-level data and instance-level data.

  Integrating with Standard Python

  In this chapter, you'll learn how to make sure that objects that store the
  same data are considered equal, how to define and customize string
  representations of objects, and even how to create new error types. Through
  interactive exercises, you’ll learn how to further customize your classes to
  make them work more like standard Python data types.

  Best Practices of Class Design

  How do you design classes for inheritance? Does Python have private
  attributes? Is it possible to control attribute access? You'll find answers
  to these questions (and more) as you learn class design best practices.
