overview: |-
  Use Real-World SQL

  You will review some of the most commonly used SQL commands to ensure you
  are prepared to tackle both real-world problems as well as every exercise
  covered in this course.

  Find Your Data

  How do you find the data you need in your database in order to answer
  real-world business questions? Here you will learn how to use system tables
  to explore your database. You will use these tables to create a new tool
  that contains a list of all tables and columns in your database. Finally,
  you will create an Entity Relationship Diagram (ERD) which will help you
  connect multiple tables.

  Manage Your Data

  Working with SQL to solve real-world problems will oftentimes require you to
  do more than retrieve the data you need, oftentimes you will need to manage
  the data in your database. This includes creating data, updating it and,
  when necessary, deleting it.

  Best Practices for Writing SQL

  How do you ensure that the SQL scripts you write will be easy to understand
  for anyone who needs to read them? This chapter will cover approaches you
  can leverage to ensure that your code clearly conveys your intent, is
  readable by others and follows best practices.
