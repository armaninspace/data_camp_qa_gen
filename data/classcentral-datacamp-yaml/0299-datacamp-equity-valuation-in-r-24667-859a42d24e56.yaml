overview: |-
  Present Value Approaches

  Many individuals and institutions invest in equities. To do so effectively,
  the investor must have a solid understanding of how the value of the equity
  compares to the stock price. In this course, we focus on fundamental
  concepts of equity valuation. We begin with a discussion of time value of
  money and then move on to the first of two discounted cash flow methods we
  will discuss - the free cash flow to equity valuation model.

  Perpetuity Growth Rate, Analyzing Projections, and Using a Dividend Discount
  Model

  One of the critical components of free cash flow to equity valuation is
  using reliable projections. In the first part of this chapter, we will
  discuss ways to analyze the projections to help us identify the right
  questions to ask. In the second part of this chapter, we will go through the
  second of our discounted cash flow models - the dividend discount model. In
  this approach, we discount expected dividends instead of free cash flows.

  Discount Rate / Cost of Capital Estimation

  To be able to discount cash flows, we need a discount rate. For the free
  cash flow to equity and dividend discount model, the cost of equity is the
  appropriate discount rate. In this chapter, we will discuss how each of the
  components of the cost of equity are calculated.

  Relative Valuation

  Relative valuation allows us to use the valuation of comparable companies to
  infer the value of our subject firm. In this chapter, we discuss how to
  identify comparable companies and how to calculate valuation multiples. We
  also show how to analyze the determinants of multiples.

  Comprehensive Exercise

  This chapter combines the lessons from Chapters 1 to 4 in a series of
  exercises. You will be asked to inspect the data and to value the firm using
  discounted cash flow and relative valuation approaches. At the end, you will
  combine the results in a summary table.
