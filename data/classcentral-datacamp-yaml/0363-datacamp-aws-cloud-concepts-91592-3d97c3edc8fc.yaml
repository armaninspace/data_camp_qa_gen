overview: |-
  Introduction to AWS

  -You have decided to learn more about the AWS cloud platform.
  Congratulations! Throughout this chapter, you will discover why AWS is a
  great set of tools for developers and data practitioners. You will expand
  your knowledge regarding the cloud provider, its history, and key figures
  demonstrating the platform's success.

  AWS value proposition and economics

  -So far, you have discovered some of the benefits of AWS compared to
  on-premises configurations. This chapter will walk you through a deep dive
  into the AWS value proposition and economics. AWS has designed a dedicated
  framework called the AWS cloud value framework, articulated around four
  pillars, to make it easier to convey and grasp its value proposition.

  Each lesson of this chapter is dedicated to one of those pillars.

  Overview of AWS core services

  -Throughout this chapter, you will discover how AWS works on a more
  technical level. First, you will get a broad overview of AWS services, then
  you will focus on some of the core services covering compute, storage,
  database, networking, content delivery, management, security, and identity.

  The Well-Architected Framework

  -The AWS Well-Architected Framework provides a set of best practices to
  maximize the value of AWS. It is composed of five pillars: operational
  excellence, security, reliability, performance efficiency, and cost
  optimization. This chapter will help you grasp the underlying best practices
  of each pillar.
