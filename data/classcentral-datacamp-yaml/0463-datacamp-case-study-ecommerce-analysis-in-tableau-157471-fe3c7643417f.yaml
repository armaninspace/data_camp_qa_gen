overview: |-
  In ecommerce, increasing sales and reducing expenses are top priorities. In
  this case study, you'll investigate data from an online pet supply company.

  Are you ready to apply your Tableau skills to solve practical business
  problems? For ecommerce businesses, increasing sales and reducing expenses
  are top priorities. In this Tableau case study, you'll investigate a dataset
  from a fictitious online pet supply company called Munchy's.

  Use Your Tableau Skills With a Practical Case Study

  First, you’ll analyze the sales dataset and find out which products are
  frequently bought together and in what quantity. You will then make upsell
  and cross-sell recommendations by building a market basket analysis.

  Next, you’ll need to address the fact that shipping costs remain a big
  expense for online retailers. You’ll work on strategies such as shipping
  more of the same product to reduce per-unit costs. You will also need to
  understand where the customers are and what they buy to make recommendations
  to the management for a new warehouse location.

  Analyze The Data and Visualize Your Findings

  As you collate your findings, you’ll create calculated fields and various
  visualizations in Tableau, such as dual-axis graphs, highlight tables, and
  maps. Finally, you'll use filters and parameters to make your graphs dynamic
  and combine everything into a story to share your recommendations.
syllabus:
  - title: "Data Exploration"
    summary: |-
      In this first chapter, you’ll build a dataset for sales and expense
      analysis. You’ll combine multiple files, filter out invalid data,
      and create metrics for customers and orders. Using a self-join on
      sales data, learn to create a correlation matrix. Use the
      correlation matrix to determine products that are frequently bought
      together.
  - title: "Ecommerce Analytics"
    summary: |-
      Next, you’ll create metrics for the most profitable products and
      customers. You’ll standardize location names and build a map of
      sales by state, before exploring the shipping cost metrics. Finally,
      you’ll build a what-if analysis to display the impact of shipping
      higher quantities on shipping costs.
  - title: "Visualize Your Analysis"
    summary: |-
      In the final chapter, you’ll build multiple dashboards and present
      them as a coherent story. You’ll display the product and customer
      attributes that will result in the highest ROI for the
      upsell/cross-sell campaign. To round off, you’ll recommend specific
      actions to reduce shipping expenses.
