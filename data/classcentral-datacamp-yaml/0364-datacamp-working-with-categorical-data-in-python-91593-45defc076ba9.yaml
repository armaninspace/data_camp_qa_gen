overview: |-
  Introduction to Categorical Data

  Almost every dataset contains categorical information—and often it’s an
  unexplored goldmine of information. In this chapter, you’ll learn how pandas
  handles categorical columns using the data type category. You’ll also
  discover how to group data by categories to unearth great summary
  statistics.

  Categorical pandas Series

  Now it’s time to learn how to set, add, and remove categories from a Series.
  You’ll also explore how to update, rename, collapse, and reorder categories,
  before applying your new skills to clean and access other data within your
  DataFrame.

  Visualizing Categorical Data

  In this chapter, you’ll use the seaborn Python library to create informative
  visualizations using categorical data—including categorical plots
  (cat-plot), box plots, bar plots, point plots, and count plots. You’ll then
  learn how to visualize categorical columns and split data across categorical
  columns to visualize summary statistics of numerical columns.

  Pitfalls and Encoding

  Lastly, you’ll learn how to overcome the common pitfalls of using
  categorical data. You’ll also grow your data encoding skills as you are
  introduced to label encoding and one-hot encoding—perfect for helping you
  prepare your data for use in machine learning algorithms.
