overview: |-
  Learn how to import and clean data, calculate statistics, and create
  visualizations with pandas.

  Discover Data Manipulation with pandas

  With this course, you’ll learn why pandas is the world's most popular Python
  library, used for everything from data manipulation to data analysis. You’ll
  explore how to manipulate DataFrames, as you extract, filter, and transform
  real-world datasets for analysis.

  With pandas, you’ll explore all the core data science concepts. Using
  real-world data, including Walmart sales figures and global temperature time
  series, you’ll learn how to import, clean, calculate statistics, and create
  visualizations—using pandas to add to the power of Python.

  Work with pandas Data to Explore Core Data Science Concepts

  You’ll start by mastering the pandas basics, including how to inspect
  DataFrames and perform some fundamental manipulations. You’ll also learn
  about aggregating DataFrames, before moving on to slicing and indexing.

  You’ll wrap up the course by learning how to visualize the contents of your
  DataFrames, working with a dataset that contains weekly US avocado sales.

  Learn to Manipulate DataFrames

  By completing this pandas course, you’ll understand how to use this Python
  library for data manipulation. You’ll have an understanding of DataFrames
  and how to use them, as well as be able to visualize your data in Python.
