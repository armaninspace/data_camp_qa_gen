course_id: '24525'
title: Data Processing in Shell
normalized_course:
  course_id: '24525'
  title: Data Processing in Shell
  provider: DataCamp
  summary: 'Learn powerful command-line skills to download, process,  and transform

    data, including machine learning pipeline.'
  overview: 'Downloading Data on the Command Line


    In this chapter, we learn how to download data files from web servers via

    the command line. In the process, we also learn about documentation manuals,

    option flags, and multi-file processing.


    Data Cleaning and Munging on the Command Line


    We continue our data journey from data downloading to data processing. In

    this chapter, we utilize the command line library csvkit to convert,

    preview, filter and manipulate files to prepare our data for further

    analyses.


    Database Operations on the Command Line


    In this chapter, we dig deeper into all that csvkit library has to offer. In

    particular, we focus on database operations we can do on the command line,

    including table creation, data pull, and various ETL transformation.


    Data Pipeline on the Command Line


    In the last chapter, we bridge the connection between command line and other

    data science languages and learn how they can work together. Using Python as

    a case study, we learn to execute Python on the command line, to install

    dependencies using the package manager pip, and to build an entire model

    pipeline using the command line.'
  chapters:
  - chapter_index: 1
