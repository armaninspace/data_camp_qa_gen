course_id: '24395'
title: Introduction to Data Visualization with ggplot2
normalized_course:
  course_id: '24395'
  title: Introduction to Data Visualization with ggplot2
  provider: DataCamp
  summary: 'Learn to produce meaningful and beautiful data visualizations with ggplot2

    by understanding the grammar of graphics.'
  overview: 'Learn to produce meaningful and beautiful data visualizations with ggplot2

    by understanding the grammar of graphics.


    The ability to produce meaningful and beautiful data visualizations is an

    essential part of your skill set as a data scientist. This course, the first

    R data visualization tutorial in the series, introduces you to the

    principles of good visualizations and the grammar of graphics plotting

    concepts implemented in the ggplot2 package. ggplot2 has become the go-to

    tool for flexible and professional plots in R. Here, we’ll examine the first

    three essential layers for making a plot - Data, Aesthetics and Geometries.

    By the end of the course you will be able to make complex exploratory plots.


    The videos contain live transcripts you can reveal by clicking "Show

    transcript" at the bottom left of the videos.


    The course glossary can be found on the right in the resources section.


    To obtain CPE credits you need to complete the course and reach a score of

    70% on the qualified assessment. You can navigate to the assessment by

    clicking on the CPE credits callout on the right.'
  chapters:
  - chapter_index: 1
    title: Introduction
    summary: 'In this chapter we’ll get you into the right frame of mind for

      developing meaningful visualizations with R. You’ll understand that

      as a communications tool, visualizations require you to think about

      your audience first. You’ll also be introduced to the basics of

      ggplot2 - the 7 different grammatical elements (layers) and

      aesthetic mappings.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 2
    title: Aesthetics
    summary: 'Aesthetic mappings are the cornerstone of the grammar of graphics

      plotting concept. This is where the magic happens - converting

      continuous and categorical data into visual scales that provide

      access to a large amount of information in a very short time. In

      this chapter you’ll understand how to choose the best aesthetic

      mappings for your data.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 3
    title: Geometries
    summary: 'A plot’s geometry dictates what visual elements will be used. In

      this chapter, we’ll familiarize you with the geometries used in the

      three most common plot types you’ll encounter - scatter plots, bar

      charts and line plots. We’ll look at a variety of different ways to

      construct these plots.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 4
    title: Themes
    summary: 'In this chapter, we’ll explore how understanding the structure of

      your data makes data visualization much easier. Plus, it’s time to

      make our plots pretty. This is the last step in the data viz

      process. The Themes layer will enable you to make publication

      quality plots directly in R. In the next course we''ll look at some

      extra layers to add more variables to your plots.'
    source: syllabus
    confidence: 1.0
