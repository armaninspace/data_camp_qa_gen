course_id: '24475'
title: Machine Learning with caret in R
normalized_course:
  course_id: '24475'
  title: Machine Learning with caret in R
  provider: DataCamp
  summary: 'This course teaches the big ideas in machine learning like how to build
    and

    evaluate predictive models.'
  overview: 'Regression Models: Fitting and Evaluating Their Performance


    In the first chapter of this course, you''ll fit regression models with

    train() and evaluate their out-of-sample performance using cross-validation

    and root-mean-square error (RMSE).


    Classification Models: Fitting and Evaluating Their Performance


    In this chapter, you''ll fit classification models with train() and evaluate

    their out-of-sample performance using cross-validation and area under the

    curve (AUC).


    Tuning Model Parameters to Improve Performance


    In this chapter, you will use the train() function to tweak model parameters

    through cross-validation and grid search.


    Preprocessing Data


    In this chapter, you will practice using train() to preprocess data before

    fitting models, improving your ability to making accurate predictions.


    Selecting Models: A Case Study in Churn Prediction


    In the final chapter of this course, you''ll learn how to use resamples() to

    compare multiple models and select (or ensemble) the best one(s).'
  chapters:
  - chapter_index: 1
    title: 'Regression Models: Fitting and Evaluating Their Performance'
    summary: 'In the first chapter of this course, you''ll fit regression models

      with train() and evaluate their out-of-sample performance using

      cross-validation and root-mean-square error (RMSE).'
    source: syllabus
    confidence: 1.0
  - chapter_index: 2
    title: 'Classification Models: Fitting and Evaluating Their Performance'
    summary: 'In this chapter, you''ll fit classification models with train() and

      evaluate their out-of-sample performance using cross-validation and

      area under the curve (AUC).'
    source: syllabus
    confidence: 1.0
  - chapter_index: 3
    title: Tuning Model Parameters to Improve Performance
    summary: 'In this chapter, you will use the train() function to tweak model

      parameters through cross-validation and grid search.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 4
    title: Preprocessing Data
    summary: 'In this chapter, you will practice using train() to preprocess data

      before fitting models, improving your ability to making accurate

      predictions.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 5
    title: 'Selecting Models: A Case Study in Churn Prediction'
    summary: 'In the final chapter of this course, you''ll learn how to use

      resamples() to compare multiple models and select (or ensemble) the

      best one(s).'
    source: syllabus
    confidence: 1.0
