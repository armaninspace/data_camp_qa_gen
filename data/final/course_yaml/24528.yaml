normalized_course:
  course_id: '24528'
  title: to the most complex tasks, like applying functions on groups of entries,
  provider: DataCamp
  summary: Learn efficient techniques in pandas to optimize your Python code.
  overview: 'Learn efficient techniques in pandas to optimize your Python code.


    The ability to efficiently work with big datasets and extract valuable

    information is an indispensable tool for every aspiring data scientist. When

    working with a small amount of data, we often don’t realize how slow code

    execution can be. This course will build on your knowledge of Python and the

    pandas library and introduce you to efficient built-in pandas functions to

    perform tasks faster. Pandas’ built-in functions allow you to tackle the

    simplest tasks, like targeting specific entries and features from the data,

    to the most complex tasks, like applying functions on groups of entries,

    much faster than Python''s usual methods. By the end of this course, you will

    be able to apply a function to data based on a feature value, iterate

    through big datasets rapidly, and manipulate data belonging to different

    groups efficiently. You will apply these methods on a variety of real-world

    datasets, such as poker hands or restaurant tips.'
