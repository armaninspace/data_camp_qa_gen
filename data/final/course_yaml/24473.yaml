normalized_course:
  course_id: '24473'
  title: -Now that your data has been tamed, it is time to get tidy. In this chapter,
  provider: DataCamp
  summary: 'Learn to work with data using tools from the tidyverse, and master the

    important skills of taming and tidying your data.'
  overview: 'Explore your data


    -You will start this course by learning how to read data into R. We''ll begin

    with the readr package, and use it to read in data files organized in rows

    and columns. In the rest of the chapter, you''ll learn how to explore your

    data using tools to help you view, summarize, and count values effectively.

    You''ll see how each of these steps gives you more insights into your data.


    Tame your data


    -In this chapter, you will learn some basics of data taming, like how to

    tame your variable types, names, and values.


    Tidy your data


    -Now that your data has been tamed, it is time to get tidy. In this chapter,

    you will get hands-on experience tidying data and combining multiple tidying

    functions together in a chain using the pipe operator.


    Transform your data


    -In this chapter, you will learn how to tame specific types of variables

    that are known to be tricky to work with, such as dates, strings, and

    factors.'
