normalized_course:
  course_id: '24454'
  title: Multiple Regression
  provider: DataCamp
  summary: 'In this course you''ll learn to add multiple variables to linear models
    and

    to use logistic regression for classification.'
  overview: 'Parallel Slopes


    -In this chapter you''ll learn about the class of linear models called

    "parallel slopes models." These include one numeric and one categorical

    explanatory variable.


    Evaluating and extending parallel slopes model


    -This chapter covers model evaluation. By looking at different properties of

    the model, including the adjusted R-squared, you''ll learn to compare models

    so that you can select the best one. You''ll also learn about interaction

    terms in linear models.


    Multiple Regression


    -This chapter will show you how to add two, three, and even more numeric

    explanatory variables to a linear model.


    Logistic Regression


    -In this chapter you''ll learn about using logistic regression, a generalized

    linear model (GLM), to predict a binary outcome and classify observations.


    Case Study: Italian restaurants in NYC


    -Explore the relationship between price and the quality of food, service,

    and decor for Italian restaurants in NYC.'
