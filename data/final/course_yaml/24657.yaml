course_id: '24657'
title: Analyzing US Census Data in Python
normalized_course:
  course_id: '24657'
  title: Analyzing US Census Data in Python
  provider: DataCamp
  summary: Learn to use the Census API to work with demographic and socioeconomic
    data.
  overview: 'Decennial Census of Population and Housing


    Start exploring Census data products with the Decennial Census. Use the

    Census API and the requests package to retrieve data, load into pandas data

    frames, and conduct exploratory visualization in seaborn. Learn about

    important Census geographies, including states, counties, and tracts.


    American Community Survey


    Explore topics such as health insurance coverage and gentrification using

    the American Community Survey. Calculate Margins of Error and explore change

    over time. Create choropleth maps using geopandas.


    Measuring Segregation


    Explore racial segregation in America. Calculate the Index of Dissimilarity,

    and important measure of segregation. Learn about and use Metropolitan

    Statistical Areas, and important geography for urban research. Study

    segregation changes over time in Chicago.


    Exploring Census Topics


    In this chapter, you will apply what you have learned to four topical

    studies. Explore unemployment by race and ethnicity; commuting patterns and

    worker density; immigration and state-to-state population flows; and rent

    burden in San Francisco.'
  chapters:
  - chapter_index: 1
    title: Decennial Census of Population and Housing
    summary: 'Start exploring Census data products with the Decennial Census. Use

      the Census API and the requests package to retrieve data, load into

      pandas data frames, and conduct exploratory visualization in

      seaborn. Learn about important Census geographies, including states,

      counties, and tracts.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 2
    title: American Community Survey
    summary: 'Explore topics such as health insurance coverage and gentrification

      using the American Community Survey. Calculate Margins of Error and

      explore change over time. Create choropleth maps using geopandas.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 3
    title: Measuring Segregation
    summary: 'Explore racial segregation in America. Calculate the Index of

      Dissimilarity, and important measure of segregation. Learn about and

      use Metropolitan Statistical Areas, and important geography for

      urban research. Study segregation changes over time in Chicago.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 4
    title: Exploring Census Topics
    summary: 'In this chapter, you will apply what you have learned to four

      topical studies. Explore unemployment by race and ethnicity;

      commuting patterns and worker density; immigration and

      state-to-state population flows; and rent burden in San Francisco.'
    source: syllabus
    confidence: 1.0
