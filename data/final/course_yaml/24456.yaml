  - chapter_index: 3
    title: Fine-tuning your XGBoost model
    summary: 'This chapter will teach you how to make your XGBoost models as

      performant as possible. You''ll learn about the variety of parameters

      that can be adjusted to alter the behavior of XGBoost and how to

      tune them efficiently so that you can supercharge the performance of

