  - chapter_index: 3
    title: Plotting Data with Matplotlib
    summary: 'Get ready to visualize your data! You''ll create line plots with

      another Python module: Matplotlib. Using line plots, you''ll analyze

      the letter frequencies from the ransom note and several handwriting

