title: Introduction to Data Science in Python
normalized_course:
  course_id: '24373'
  title: Introduction to Data Science in Python
  provider: DataCamp
  summary: 'Dive into data science using Python and learn how to effectively analyze
    and

    visualize your data. No coding experience or skills needed.'
  overview: 'Getting Started in Python


    Welcome to the wonderful world of Data Analysis in Python! In this chapter,

    you''ll learn the basics of Python syntax, load your first Python modules,

    and use functions to get a suspect list for the kidnapping of Bayes,

    DataCamp''s prize-winning Golden Retriever.


    Loading Data in pandas


    In this chapter, you''ll learn a powerful Python libary: pandas. pandas lets

    you read, modify, and search tabular datasets (like spreadsheets and

    database tables). You''ll examine credit card records for the suspects and

    see if any of them made suspicious purchases.


    Plotting Data with Matplotlib


    Get ready to visualize your data! You''ll create line plots with another

    Python module: Matplotlib. Using line plots, you''ll analyze the letter

    frequencies from the ransom note and several handwriting samples to

    determine the kidnapper.


    Different Types of Plots


    In this final chapter, you''ll learn how to create three new plot types:

    scatter plots, bar plots, and histograms. You''ll use these tools to locate

    where the kidnapper is hiding and rescue Bayes, the Golden Retriever.'
