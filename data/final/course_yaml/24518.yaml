course_id: '24518'
title: Feature Engineering for NLP in Python
normalized_course:
  course_id: '24518'
  title: Feature Engineering for NLP in Python
  provider: DataCamp
  summary: 'Learn techniques to extract useful information from text and process them

    into a format suitable for machine learning.'
  overview: 'Basic features and readability scores


    Learn to compute basic features such as number of words, number of

    characters, average word length and number of special characters (such as

    Twitter hashtags and mentions). You will also learn to compute readability

    scores and determine the amount of education required to comprehend a piece

    of text.


    Text preprocessing, POS tagging and NER


    In this chapter, you will learn about tokenization and lemmatization. You

    will then learn how to perform text cleaning, part-of-speech tagging, and

    named entity recognition using the spaCy library. Upon mastering these

    concepts, you will proceed to make the Gettysburg address machine-friendly,

    analyze noun usage in fake news, and identify people mentioned in a

    TechCrunch article.


    N-Gram models


    Learn about n-gram modeling and use it to perform sentiment analysis on

    movie reviews.


    TF-IDF and similarity scores


    Learn how to compute tf-idf weights and the cosine similarity score between

    two vectors. You will use these concepts to build a movie and a TED Talk

    recommender. Finally, you will also learn about word embeddings and using

    word vector representations, you will compute similarities between various

    Pink Floyd songs.'
  chapters:
  - chapter_index: 1
    title: Basic features and readability scores
    summary: 'Learn to compute basic features such as number of words, number of

      characters, average word length and number of special characters

      (such as Twitter hashtags and mentions). You will also learn to

      compute readability scores and determine the amount of education

      required to comprehend a piece of text.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 2
    title: Text preprocessing, POS tagging and NER
    summary: 'In this chapter, you will learn about tokenization and

      lemmatization. You will then learn how to perform text cleaning,

      part-of-speech tagging, and named entity recognition using the spaCy

      library. Upon mastering these concepts, you will proceed to make the

      Gettysburg address machine-friendly, analyze noun usage in fake

      news, and identify people mentioned in a TechCrunch article.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 3
    title: N-Gram models
    summary: 'Learn about n-gram modeling and use it to perform sentiment analysis

      on movie reviews.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 4
    title: TF-IDF and similarity scores
    summary: 'Learn how to compute tf-idf weights and the cosine similarity score

      between two vectors. You will use these concepts to build a movie

      and a TED Talk recommender. Finally, you will also learn about word

      embeddings and using word vector representations, you will compute

      similarities between various Pink Floyd songs.'
    source: syllabus
    confidence: 1.0
