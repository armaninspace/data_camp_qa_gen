normalized_course:
  course_id: '24377'
  title: multiple parameters and multiple return values, along with default arguments
  provider: DataCamp
  summary: 'Learn the art of writing your own functions in Python, as well as key

    concepts like scoping and error handling.'
  overview: 'Learn the art of writing your own functions in Python, as well as key

    concepts like scoping and error handling.


    It''s time to push forward and develop your Python chops even further. Python

    has tons of fantastic functions and a module ecosystem. However, as a data

    professional or developer, you''ll constantly need to write your own

    functions to solve problems that are dictated by your data. You will learn

    the art of function writing in this first course. You''ll come out of this

    course being able to write your very own custom functions, complete with

    multiple parameters and multiple return values, along with default arguments

    and variable-length arguments. You''ll gain insight into scoping in Python,

    be able to write lambda functions and handle errors in your function writing

    practice. You''ll wrap up each chapter by using your new skills to write

    functions that analyze Twitter data.


    The videos contain live transcripts you can reveal by clicking "Show

    transcript" at the bottom left of the videos.


    The course glossary can be found on the right in the resources section.


    To obtain CPE credits you need to complete the course and reach a score of

    70% on the qualified assessment. You can navigate to the assessment by

    clicking on the CPE credits callout on the right.'
