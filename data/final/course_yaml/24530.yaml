      which describes the behavior of a combination of yes/no trials and

      how to predict and simulate its behavior.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 2
    title: Laws of probability
    summary: 'In this chapter you''ll learn to combine multiple probabilities, such

      as the probability two events both happen or that at least one

      happens, and confirm each with random simulations. You''ll also learn

      some of the properties of adding and multiplying random variables.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 3
    title: Bayesian statistics
    summary: 'Bayesian statistics is a mathematically rigorous method for updating

      your beliefs based on evidence. In this chapter, you''ll learn to

      apply Bayes'' theorem to draw conclusions about whether a coin is

      fair or biased, and back it up with simulations.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 4
    title: Related distributions
    summary: 'So far we''ve been talking about the binomial distribution, but this

      is one of many probability distributions a random variable can take.

      In this chapter we''ll introduce three more that are related to the

      binomial: the normal, the Poisson, and the geometric.'
    source: syllabus
    confidence: 1.0
