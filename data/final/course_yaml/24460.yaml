course_id: '24460'
title: 'Case Study: Exploratory Data Analysis in R'
normalized_course:
  course_id: '24460'
  title: 'Case Study: Exploratory Data Analysis in R'
  provider: DataCamp
  summary: 'Use data manipulation and visualization skills to explore the historical

    voting of the United Nations General Assembly.'
  overview: 'Data cleaning and summarizing with dplyr


    The best way to learn data wrangling skills is to apply them to a specific

    case study. Here you''ll learn how to clean and filter the United Nations

    voting dataset using the dplyr package, and how to summarize it into

    smaller, interpretable units.


    Data visualization with ggplot2


    Once you''ve cleaned and summarized data, you''ll want to visualize them to

    understand trends and extract insights. Here you''ll use the ggplot2 package

    to explore trends in United Nations voting within each country over time.


    Tidy modeling with broom


    While visualization helps you understand one country at a time, statistical

    modeling lets you quantify trends across many countries and interpret them

    together. Here you''ll learn to use the tidyr, purrr, and broom packages to

    fit linear models to each country, and understand and compare their outputs.


    Joining and tidying


    In this chapter, you''ll learn to combine multiple related datasets, such as

    incorporating information about each resolution''s topic into your vote

    analysis. You''ll also learn how to turn untidy data into tidy data, and see

    how tidy data can guide your exploration of topics and countries over time.'
