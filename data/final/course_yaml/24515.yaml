normalized_course:
  course_id: '24515'
  title: Winning a Kaggle Competition in Python
  provider: DataCamp
  summary: Learn how to approach and win competitions on Kaggle.
  overview: 'Kaggle competitions process


    In this first chapter, you will get exposure to the Kaggle competition

    process. You will train a model and prepare a csv file ready for submission.

    You will learn the difference between Public and Private test splits, and

    how to prevent overfitting.


    Dive into the Competition


    Now that you know the basics of Kaggle competitions, you will learn how to

    study the specific problem at hand. You will practice EDA and get to

    establish correct local validation strategies. You will also learn about

    data leakage.


    Feature Engineering


    You will now get exposure to different types of features. You will modify

    existing features and create new ones. Also, you will treat the missing data

    accordingly.


    Modeling


    Time to bring everything together and build some models! In this last

    chapter, you will build a base model before tuning some hyperparameters and

    improving your results with ensembles. You will then get some final tips and

    tricks to help you compete more efficiently.'
  chapters:
