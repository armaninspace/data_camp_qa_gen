course_id: '24450'
title: Manipulating Time Series Data in Python
normalized_course:
  course_id: '24450'
  title: Manipulating Time Series Data in Python
  provider: DataCamp
  summary: In this course you'll learn the basics of working with time series data.
  overview: 'Working with Time Series in Pandas


    This chapter lays the foundations to leverage the powerful time series

    functionality made available by how Pandas represents dates, in particular

    by the DateTimeIndex. You will learn how to create and manipulate date

    information and time series, and how to do calculations with time-aware

    DataFrames to shift your data in time or create period-specific returns.


    Basic Time Series Metrics & Resampling


    This chapter dives deeper into the essential time series functionality made

    available through the pandas DataTimeIndex. It introduces resampling and how

    to compare different time series by normalizing their start points.


    Window Functions: Rolling & Expanding Metrics


    This chapter will show you how to use window function to calculate time

    series metrics for both rolling and expanding windows.


    Putting it all together: Building a value-weighted index


    This chapter combines the previous concepts by teaching you how to create a

    value-weighted index. This index uses market-cap data contained in the stock

    exchange listings to calculate weights and 2016 stock price information.

    Index performance is then compared against benchmarks to evaluate the

    performance of the index you created.'
  chapters:
  - chapter_index: 1
    title: Working with Time Series in Pandas
    summary: 'This chapter lays the foundations to leverage the powerful time

      series functionality made available by how Pandas represents dates,

      in particular by the DateTimeIndex. You will learn how to create and

      manipulate date information and time series, and how to do

      calculations with time-aware DataFrames to shift your data in time

      or create period-specific returns.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 2
    title: Basic Time Series Metrics & Resampling
    summary: 'This chapter dives deeper into the essential time series

      functionality made available through the pandas DataTimeIndex. It

      introduces resampling and how to compare different time series by

      normalizing their start points.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 3
    title: 'Window Functions: Rolling & Expanding Metrics'
    summary: 'This chapter will show you how to use window function to calculate

      time series metrics for both rolling and expanding windows.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 4
    title: 'Putting it all together: Building a value-weighted index'
    summary: 'This chapter combines the previous concepts by teaching you how to

      create a value-weighted index. This index uses market-cap data

      contained in the stock exchange listings to calculate weights and

      2016 stock price information. Index performance is then compared

      against benchmarks to evaluate the performance of the index you

      created.'
    source: syllabus
    confidence: 1.0
