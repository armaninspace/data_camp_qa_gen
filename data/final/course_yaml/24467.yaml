course_id: '24467'
title: Introduction to Deep Learning with Keras
normalized_course:
  course_id: '24467'
  title: Introduction to Deep Learning with Keras
  provider: DataCamp
  summary: Learn to start developing deep learning models with Keras.
  overview: 'Introducing Keras


    In this first chapter, you will get introduced to neural networks,

    understand what kind of problems they can solve, and when to use them. You

    will also build several networks and save the earth by training a regression

    model that approximates the orbit of a meteor that is approaching us!


    Going Deeper


    By the end of this chapter, you will know how to solve binary, multi-class,

    and multi-label problems with neural networks. All of this by solving

    problems like detecting fake dollar bills, deciding who threw which dart at

    a board, and building an intelligent system to water your farm. You will

    also be able to plot model training metrics and to stop training and save

    your models when they no longer improve.


    Improving Your Model Performance


    In the previous chapters, you''ve trained a lot of models! You will now learn

    how to interpret learning curves to understand your models as they train.

    You will also visualize the effects of activation functions, batch-sizes,

    and batch-normalization. Finally, you will learn how to perform automatic

    hyperparameter optimization to your Keras models using sklearn.


    Advanced Model Architectures


    It''s time to get introduced to more advanced architectures! You will create

    an autoencoder to reconstruct noisy images, visualize convolutional neural

    network activations, use deep pre-trained models to classify images and

    learn more about recurrent neural networks and working with text as you

    build a network that predicts the next word in a sentence.'
