course_id: '24394'
title: Introduction to Relational Databases in SQL
normalized_course:
  course_id: '24394'
  title: Introduction to Relational Databases in SQL
  provider: DataCamp
  summary: 'Learn how to create one of the most efficient ways of storing data -

    relational databases!'
  overview: 'Learn how to create one of the most efficient ways of storing data -

    relational databases!


    Explore the Role of SQL in Relational Database Management


    There are a lot of reasons why SQL is the go-to query language for

    relational database management. The main one is that SQL is a powerful

    language that can handle large amounts of data in complex ways and solve

    tricky analytical questions. In this course, you will gain an introduction

    to relational databases in SQL.


    Learn how to create tables and specify their relationships, as well as how

    to enforce data integrity. Additionally, discover other unique features of

    database systems, such as constraints.


    Create Your First Database


    You begin the course by creating your first database with simple SQL

    commands. Next, you’ll learn how to update your database as the structure

    changes by migrating data and deleting tables.


    In the final chapter, you will glue tables in foreign keys together and

    establish relationships that greatly benefit your data quality. Finally, you

    will run ad hoc analyses on your new database.


    Understand the Basics of Relational Databases


    By the end of the course, you will gain a basic yet essential understanding

    of SQL relational databases. They are widely used in various data science

    fields (from healthcare to finance) and have consequently become one of the

    crucial languages for data scientists. If you''re interested in deepening

    your knowledge further, you may be interested in our SQL for Database

    Administrators, SQL Server Developer, and SQL Server for Database

    Administrators Tracks.'
  chapters:
  - chapter_index: 1
    title: Your first database
    summary: 'In this chapter, you''ll create your very first database with a set

      of simple SQL commands. Next, you''ll migrate data from existing flat

      tables into that database. You''ll also learn how meta-information

      about a database can be queried.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 2
    title: Enforce data consistency with attribute constraints
    summary: 'After building a simple database, it''s now time to make use of the

      features. You''ll specify data types in columns, enforce column

      uniqueness, and disallow NULL values in this chapter.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 3
    title: Uniquely identify records with key constraints
    summary: 'Now let’s get into the best practices of database engineering. It''s

      time to add primary and foreign keys to the tables. These are two of

      the most important concepts in databases, and are the building

      blocks you’ll use to establish relationships between tables.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 4
    title: Glue together tables with foreign keys
    summary: 'In the final chapter, you''ll leverage foreign keys to connect tables

      and establish relationships that will greatly benefit your data

      quality. And you''ll run ad hoc analyses on your new database.'
    source: syllabus
    confidence: 1.0
