course_id: '24381'
title: Introduction to Tableau
normalized_course:
  course_id: '24381'
  title: Introduction to Tableau
  provider: DataCamp
  summary: 'Start your Tableau journey with our Introduction to Tableau course. Discover

    Tableau basics such as its features and dashboards.'
  overview: 'Start your Tableau journey with our Introduction to Tableau course. Discover

    Tableau basics such as its features and dashboards.


    Gain a Comprehensive Introduction to Tableau


    Tableau is a widely used BI and analytics software trusted by companies like

    Amazon and Unilever to explore, create, and securely share contextualized

    data. In this course, you will learn how to build data visualizations,

    conduct data analyses and adopt best practices of data formatting with

    Tableau.


    Discover what Tableau is Used for and How to Visualize Data


    With its user-friendly drag-and-drop functionality, Tableau can be used by

    everyone to quickly clean, analyze, and visualize your team’s data. This

    course can show you how.


    You’ll begin the course by understanding Tableau’s fundamental concepts and

    features, such as how to load data and workbooks and understanding the

    interface. You will then create your first visualization with Tableau using

    an Airbnb dataset.


    Build your Own Tableau Dashboard


    The final chapters explore best practices for formatting and presenting your

    data with Tableau, including creating a dual-axis graph, understanding the

    differences between a worksheet, dashboard, and story, and finally, creating

    your very first Tableau dashboard.


    By the end of this course, you’ll have the skills you need to confidently

    explore Tableau and build impactful data dashboards. Check out our Tableau

    Fundamentals track to further develop your Tableau skills.'
  chapters:
  - chapter_index: 1
    title: Getting Started with Tableau
    summary: 'You will get an understanding of Tableau''s fundamental concepts and

      features: how to connect to data sources, use Tableau’s

      drag-and-drop interface, and create compelling visualizations. You

      will explore an Airbnb dataset for the city of Amsterdam.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 2
    title: Building and Customizing Visualizations
    summary: 'Let’s take it up a level and review the core concepts required for

      analyzing and exploring data in Tableau. You’ll learn how to slice

      and dice data with filters, create new columns using your own

      calculated fields, and aggregate dimensions and measures in a view.

      You will be working with education, social and infrastructure data.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 3
    title: Digging Deeper
    summary: 'Dive deeper into analytics by learning how to visualize geographic

      data and plot data onto a map visualization. You’ll learn how to

      work with dates in Tableau and explore how the data changes with

      time. You’ll also learn how to add reference, trend, and forecasting

      lines to your views. You will do all of this exploring health

      statistics worldwide.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 4
    title: Presenting Your Data
    summary: 'Your data is full of interesting stories and insights still waiting

      to be told. Learn best practices for formatting and presenting

      visualisations to tell data-driven stories. Using a new dataset on

      video game sales you''ll be building your first dashboard!'
    source: syllabus
    confidence: 1.0
