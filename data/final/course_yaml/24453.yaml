  overview: 'Dashboards are a must-have in a data-driven world. Increase your impact
    on

    business performance with Tableau dashboards.


    Dashboard-driven Development


    Dashboards are a must-have tool in today’s data-driven world. By combining

    curated data visualizations, dashboards allow users to interpret and ask

    their own questions of data. By reducing the time to insight and empowering

    business analysts, dashboards can have a big impact on business

    performance.Tableau''s dashboarding abilities are powerful and easy to use.


    Learning Best Practices


    In this course, you''ll learn to apply dashboard-composition best practices,

    add interactive or explanatory elements, and use dashboard actions to make

    your dashboard interactive. Additionally, you''ll learn to modify an existing

    dashboard layout for mobile devices to share as an image or a PDF.


    Finally, you''ll learn how to share your data story through Tableau''s story

    functionality.'
