title: Software Engineering Principles in Python
normalized_course:
  course_id: '24461'
  title: Software Engineering Principles in Python
  provider: DataCamp
  summary: 'Learn about modularity, documentation, and automated testing to help you

    solve data science problems more quickly and reliably.'
  overview: 'Software Engineering & Data Science


    Why should you as a Data Scientist care about Software Engineering concepts?

    Here we''ll cover specific Software Engineering concepts and how these

    important ideas can revolutionize your Data Science workflow!


    Writing a Python Module


    Become a fully fledged Python package developer by writing your first

    package! You''ll learn how to structure and write Python code that you can be

    installed, used, and distributed just like famous packages such as NumPy and

    Pandas.


    Utilizing Classes


    Object Oriented Programming is a staple of Python development. By leveraging

    classes and inheritance your Python package will become a much more powerful

    tool for your users.


    Maintainability


    You''ve now written a fully functional Python package for text analysis! To

    make maintaining your project as easy as possible we''ll leverage best

    practices around concepts such as documentation and unit testing.'
  chapters:
  - chapter_index: 1
    title: Software Engineering & Data Science
    summary: 'Why should you as a Data Scientist care about Software Engineering

      concepts? Here we''ll cover specific Software Engineering concepts

      and how these important ideas can revolutionize your Data Science

      workflow!'
    source: syllabus
    confidence: 1.0
  - chapter_index: 2
