  - chapter_index: 3
    title: Imputation Techniques
    summary: 'Embark on the world of data imputation! In this chapter, you will

      apply basic imputation techniques to fill in missing data and

      visualize your imputations to be able to evaluate your imputations''

      performance.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 4
    title: Advanced Imputation Techniques
    summary: 'Finally, go beyond simple imputation techniques and make the most of

