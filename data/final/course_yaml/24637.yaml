course_id: '24637'
title: Inference for Categorical Data in R
normalized_course:
  course_id: '24637'
  title: Inference for Categorical Data in R
  provider: DataCamp
  summary: 'In this course you''ll learn how to leverage statistical techniques for

    working with categorical data.'
  overview: 'Inference for a single parameter


    In this chapter you will learn how to perform statistical inference on a

    single parameter that describes categorical data. This includes both

    resampling based methods and approximation based methods for a single

    proportion.


    Proportions: testing and power


    This chapter dives deeper into performing hypothesis tests and creating

    confidence intervals for a single parameter. Then, you''ll learn how to

    perform inference on a difference between two proportions. Finally, this

    chapter wraps up with an exploration of what happens when you know the null

    hypothesis is true.


    Comparing many parameters: independence


    This part of the course will teach you how to use both resampling methods

    and classical methods to test for the indepence of two categorical

    variables. This chapter covers how to perform a Chi-squared test.


    Comparing many parameters: goodness of fit


    The course wraps up with two case studies using election data. Here, you''ll

    learn how to use a Chi-squared test to check goodness-of-fit. You''ll study

    election results from Iran and Iowa and test if Benford''s law applies to

    these datasets.'
  chapters:
  - chapter_index: 1
    title: Inference for a single parameter
