  - chapter_index: 2
    title: 'Proportions: testing and power'
    summary: 'This chapter dives deeper into performing hypothesis tests and

      creating confidence intervals for a single parameter. Then, you''ll

      learn how to perform inference on a difference between two

      proportions. Finally, this chapter wraps up with an exploration of

      what happens when you know the null hypothesis is true.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 3
    title: 'Comparing many parameters: independence'
    summary: 'This part of the course will teach you how to use both resampling

      methods and classical methods to test for the indepence of two

      categorical variables. This chapter covers how to perform a

      Chi-squared test.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 4
    title: 'Comparing many parameters: goodness of fit'
    summary: 'The course wraps up with two case studies using election data. Here,

      you''ll learn how to use a Chi-squared test to check goodness-of-fit.

      You''ll study election results from Iran and Iowa and test if

      Benford''s law applies to these datasets.'
    source: syllabus
    confidence: 1.0
