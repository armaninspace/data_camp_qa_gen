course_id: '24653'
title: Multivariate Probability Distributions in R
normalized_course:
  course_id: '24653'
  title: Multivariate Probability Distributions in R
  provider: DataCamp
  summary: Learn to analyze, plot, and model multivariate data.
  overview: 'Reading and plotting multivariate data


    In this introduction to multivariate data, you will learn how to read and

    summarize it. You will learn how to summarize multivariate data using

    descriptive statistics, such as the mean vector, variance-covariance, and

    correlation matrices. You''ll then explore plotting techniques to provide

    insights into multivariate data.


    Multivariate Normal Distribution


    This chapter will introduce you to the most important and widely used

    multivariate probability distribution, the multivariate normal. You will

    learn how to generate random samples from a multivariate normal distribution

    and how to calculate and plot the densities and probabilities under this

    distribution. You will also learn how to test if a dataset follows

    multivariate normality.


    Other Multivariate Distributions


    This chapter introduces a host of probability distributions to model

    non-normal data. In particular, you will be introduced to multivariate

    t-distributions, which can model heavier tails and are a generalization of

    the univariate Student''s t-distribution. You will be introduced to various

    skew distributions, which are specifically designed to model data that are

    right or left skewed.


    Principal Component Analysis and Multidimensional Scaling


    In the final chapter, you will be introduced to techniques for analyzing

    high dimensional data, including principal component analysis (PCA) and

    multidimensional scaling (MDS). You will also learn to implement these

    techniques by analyzing data.'
