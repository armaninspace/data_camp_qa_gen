normalized_course:
  course_id: '24643'
  title: Intermediate Regression in R
  provider: DataCamp
  summary: 'Learn to perform linear and logistic regression with multiple explanatory

    variables.'
  overview: 'Parallel Slopes


    Extend your linear regression skills to "parallel slopes" regression, with

    one numeric and one categorical explanatory variable. This is the first step

    towards conquering multiple linear regression.


    Interactions


    Explore the effect of interactions between explanatory variables.

    Considering interactions allows for more realistic models that can have

    better predictive power. You''ll also deal with Simpson''s Paradox: a

    non-intuitive result that arises when you have multiple explanatory

    variables.


    Multiple Linear Regression


    See how modeling, and linear regression in particular, makes it easy to work

    with more than two explanatory variables. Once you''ve mastered fitting

    linear regression models, you''ll get to implement your own linear regression

    algorithm.


    Multiple Logistic Regression


    Extend your logistic regression skills to multiple explanatory variables.

    Understand the logistic distribution, which underpins this form of

    regression. Finally, implement your own logistic regression algorithm.'
  chapters:
  - chapter_index: 1
    title: Parallel Slopes
    summary: 'Extend your linear regression skills to "parallel slopes"

      regression, with one numeric and one categorical explanatory

      variable. This is the first step towards conquering multiple linear

      regression.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 2
    title: Interactions
    summary: 'Explore the effect of interactions between explanatory variables.

      Considering interactions allows for more realistic models that can

      have better predictive power. You''ll also deal with Simpson''s

      Paradox: a non-intuitive result that arises when you have multiple

      explanatory variables.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 3
    title: Multiple Linear Regression
    summary: 'See how modeling, and linear regression in particular, makes it easy

      to work with more than two explanatory variables. Once you''ve

      mastered fitting linear regression models, you''ll get to implement

      your own linear regression algorithm.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 4
    title: Multiple Logistic Regression
    summary: 'Extend your logistic regression skills to multiple explanatory

      variables. Understand the logistic distribution, which underpins

      this form of regression. Finally, implement your own logistic

      regression algorithm.'
    source: syllabus
    confidence: 1.0
