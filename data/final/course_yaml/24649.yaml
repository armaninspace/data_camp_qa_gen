course_id: '24649'
title: Bond Valuation and Analysis in R
normalized_course:
  course_id: '24649'
  title: Bond Valuation and Analysis in R
  provider: DataCamp
  summary: 'Learn to use R to develop models to evaluate and analyze bonds as well
    as

    protect them from interest rate changes.'
  overview: 'Introduction and Plain Vanilla Bond Valuation


    The fixed income market is large and filled with complex instruments. In

    this course, we focus on plain vanilla bonds to build solid fundamentals you

    will need to tackle more complex fixed income instruments. In this chapter,

    we demonstrate the mechanics of valuing bonds by focusing on an annual

    coupon, fixed rate, fixed maturity, and option-free bond.


    Yield to Maturity


    Estimating Yield To Maturity - The YTM measures the expected return to bond

    investors if they hold the bond until maturity. This number summarizes the

    compensation investors demand for the risk they are bearing by investing in

    a particular bond. We will discuss how one can estimate YTM of a bond.


    Duration and Convexity


    Interest rate risk is the biggest risk that bond investors face. When

    interest rates rise, bond prices fall. Because of this, much attention is

    paid to how sensitive a particular bond''s price is to changes in interest

    rates. In this chapter, we start the discussion with a simple measure of

    bond price volatility - the Price Value of a Basis Point. Then, we discuss

    duration and convexity, which are two common measures that are used to

    manage interest rate risk.


    Comprehensive Example


    We will put all of the techniques that the student has learned from Chapters

    One through Three into one comprehensive example. The student will be asked

    to value a bond by using the yield on a comparable bond and estimate the

    bond''s duration and convexity.'
