course_id: '24388'
title: Introduction to SQL Server
normalized_course:
  course_id: '24388'
  title: Introduction to SQL Server
  provider: DataCamp
  summary: 'Learn to use SQL Server to perform common data manipulation tasks and
    master

    common data manipulation tasks using this database system.'
  overview: 'SELECTion Box


    Hit the ground running by learning the basics of SELECT statements to

    retrieve data from one or more columns.


    You''ll also learn how to apply filters to both numeric and text data, and

    sort the results.


    Groups, strings, and counting things


    Herein, you''ll learn how to use important SQL Server aggregate functions

    such as SUM, COUNT, MIN, MAX, and AVG. Following that, you''ll learn how to

    manipulate text fields. To round out the chapter, you''ll power up your

    queries using GROUP BY and HAVING, which will enable you to perform more

    meaningful aggregations.


    Joining tables


    This chapter covers the basics of joining tables, using INNER, LEFT, and

    RIGHT joins, so that you can confidently retrieve data from multiple

    sources.


    You''ve got the power


    In this final chapter, you''ll get really hands on! You''ve worked with

    existing tables, but in this chapter, you''ll get to CREATE and INSERT data

    into them. You''ll also UPDATE existing records and practice DELETE

    statements in a safe environment. This chapter ensures the course gives you

    a thorough introduction to the key aspects of working with data in SQL

    Server.'
  chapters:
  - chapter_index: 1
    title: SELECTion Box
    summary: 'Hit the ground running by learning the basics of SELECT statements

      to retrieve data from one or more columns. You''ll also learn how to

      apply filters to both numeric and text data, and sort the results.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 2
    title: Groups, strings, and counting things
    summary: 'Herein, you''ll learn how to use important SQL Server aggregate

      functions such as SUM, COUNT, MIN, MAX, and AVG. Following that,

      you''ll learn how to manipulate text fields. To round out the

      chapter, you''ll power up your queries using GROUP BY and HAVING,

      which will enable you to perform more meaningful aggregations.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 3
    title: Joining tables
    summary: 'This chapter covers the basics of joining tables, using INNER, LEFT,

      and RIGHT joins, so that you can confidently retrieve data from

      multiple sources.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 4
    title: You've got the power
    summary: 'In this final chapter, you''ll get really hands on! You''ve worked

      with existing tables, but in this chapter, you''ll get to CREATE and

      INSERT data into them. You''ll also UPDATE existing records and

      practice DELETE statements in a safe environment. This chapter

      ensures the course gives you a thorough introduction to the key

      aspects of working with data in SQL Server.'
    source: syllabus
    confidence: 1.0
