course_id: '24382'
title: Introduction to Power BI
normalized_course:
  course_id: '24382'
  title: Introduction to Power BI
  provider: DataCamp
  summary: 'Master the Power BI basics and learn to use the data visualization software

    to build impactful reports.'
  overview: 'Master the Power BI basics and learn to use the data visualization software

    to build impactful reports.


    A Thorough Introduction to Power BI


    In this 3-hour course, you’ll gain a 360° overview of the Power BI basics

    and learn how to use the tool to build impactful reports. In this course,

    you’ll go from zero to hero as you discover how to use this popular business

    intelligence platform through hands-on exercises.


    Before diving into creating visualizations using Power BI''s drag-and-drop

    functionality, you’ll first learn how to confidently load and transform data

    using Power Query and the importance of data models. You’ll also learn to

    drill down into reports and make your reports fully interactive.


    Learn the Power BI Basics


    You’ll start by looking at some of the fundamentals of Power BI, getting to

    grips with Data, Model, and Report views. You’ll learn to load data sets,

    build a data model, and discover how to shape and transform your data with

    Power Query Editor.


    As you progress through the course, you’ll have access to hands-on exercises

    that can hone your skills. You’ll look at various visualizations, sort

    different data types, and learn to drill deeper into your reports.


    Create Powerful Data Visualizations


    Once you''ve covered Power BI in general, you can dig into its options for

    data visualization. Learn to choose the right visual for your dataset and

    type, how to make changes to follow visualization best practices and tell a

    strong story with your data, and learn to sort and format your data for

    clearer storytelling.'
  chapters:
  - chapter_index: 1
    title: Getting Started with Power BI
    summary: 'Discover how to navigate this intuitive tool and get to grips with

      Power BI’s Data, Model, and Report views. You’ll load multiple

      datasets in the Data view, build a data model to understand the

      relationships between your tables in Model view, and create your

      first bar graph and interactive map visualization in Report view.

      You’ll also practice using Power Query Editor to prep your data for

      analysis.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 2
    title: Transforming Data
    summary: 'In this chapter, you''ll learn how to shape and transform your data

      before the data analysis using Power Query Editor.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 3
    title: Visualizing Data
    summary: 'It’s time to power-up your business intelligence skills! Through

      hands-on exercises, you’ll learn how to change and format a wide

      range of visualizations, before moving on to sorting data and

      creating hierarchies—making it possible for you to drill into your

      reports.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 4
    title: Filtering
    summary: 'In the final chapter, you’ll discover how to filter the information

      in your reports by location and control how these filters

      interconnect and interact with other visuals in your report.'
    source: syllabus
    confidence: 1.0
