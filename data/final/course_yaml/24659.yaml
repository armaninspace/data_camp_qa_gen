      Learn about the basics of life annuity products and their valuation

      by working on cases ranging from simple life annuities to retirement

      plans.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 4
    title: Life Insurances
    summary: 'You will now deal with life insurance contracts. Learn how these

      products are relevant in your financial planning by designing whole

      life, temporary and endowment insurances.'
    source: syllabus
    confidence: 1.0
