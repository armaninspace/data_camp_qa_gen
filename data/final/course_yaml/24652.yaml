course_id: '24652'
title: Hyperparameter Tuning in R
normalized_course:
  course_id: '24652'
  title: Hyperparameter Tuning in R
  provider: DataCamp
  summary: 'Learn how to tune your model''s hyperparameters to get the best predictive

    results.'
  overview: 'Introduction to hyperparameters


    Why do we use the strange word "hyperparameter"? What makes it hyper? Here,

    you will understand what model parameters are, and why they are different

    from hyperparameters in machine learning. You will then see why we would

    want to tune them and how the default setting of caret automatically

    includes hyperparameter tuning.


    Hyperparameter tuning with caret


    In this chapter, you will learn how to tune hyperparameters with a Cartesian

    grid. Then, you will implement faster and more efficient approaches. You

    will use Random Search and adaptive resampling to tune the parameter grid,

    in a way that concentrates on values in the neighborhood of the optimal

    settings.


    Hyperparameter tuning with mlr


    Here, you will use another package for machine learning that has very

    convenient hyperparameter tuning functions. You will define a Cartesian grid

    or perform Random Search, as well as advanced techniques. You will also

    learn different ways to plot and evaluate models with different

    hyperparameters.


    Hyperparameter tuning with h2o


    In this final chapter, you will use h2o, another package for machine

    learning with very convenient hyperparameter tuning functions. You will use

    it to train different models and define a Cartesian grid. Then, You will

    implement a Random Search use stopping criteria. Finally, you will learn

    AutoML, an h2o interface which allows for very fast and convenient model and

    hyperparameter tuning with just one function.'
