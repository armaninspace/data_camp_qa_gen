course_id: '24520'
title: Reshaping Data with pandas
normalized_course:
  course_id: '24520'
  title: Reshaping Data with pandas
  provider: DataCamp
  summary: 'Reshape DataFrames from a wide to long format, stack and unstack rows
    and

    columns, and wrangle multi-index DataFrames.'
  overview: 'Introduction to Data Reshaping


    Let''s start by understanding the concept of wide and long formats and the

    advantages of using each of them. You’ll then learn how to pivot data from

    long to a wide format, and get summary statistics from a large DataFrame.


    Converting Between Wide and Long Format


    Master the technique of reshaping DataFrames from wide to long format. In

    this chapter, you''ll learn how to use the melting method and wide to long

    function before discovering how to handle string columns by concatenating or

    splitting them.


    Stacking and Unstacking DataFrames


    In this chapter, you’ll level-up your data manipulation skills using

    multi-level indexing. You''ll learn how to reshape DataFrames by rearranging

    levels of the row indexes to the column axis, or vice versa. You''ll also

    gain the skills you need to handle missing data generated in the stacking

    and unstacking processes.


    Advanced Reshaping


    You''ll finish by learning how to combine the reshaping process with grouping

    to produce quick data manipulations. Lastly, you''ll discover how to

    transform list-like columns and handle complex nested data, such as nested

    JSON files.'
  chapters:
  - chapter_index: 1
    title: Introduction to Data Reshaping
    summary: 'Let''s start by understanding the concept of wide and long formats

      and the advantages of using each of them. You’ll then learn how to

      pivot data from long to a wide format, and get summary statistics

      from a large DataFrame.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 2
    title: Converting Between Wide and Long Format
    summary: 'Master the technique of reshaping DataFrames from wide to long

      format. In this chapter, you''ll learn how to use the melting method

      and wide to long function before discovering how to handle string

      columns by concatenating or splitting them.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 3
    title: Stacking and Unstacking DataFrames
    summary: 'In this chapter, you’ll level-up your data manipulation skills using

      multi-level indexing. You''ll learn how to reshape DataFrames by

      rearranging levels of the row indexes to the column axis, or vice

      versa. You''ll also gain the skills you need to handle missing data

      generated in the stacking and unstacking processes.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 4
    title: Advanced Reshaping
    summary: 'You''ll finish by learning how to combine the reshaping process with

      grouping to produce quick data manipulations. Lastly, you''ll

      discover how to transform list-like columns and handle complex

      nested data, such as nested JSON files.'
    source: syllabus
    confidence: 1.0
