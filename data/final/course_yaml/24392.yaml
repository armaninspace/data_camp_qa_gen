    summary: 'Statistical inference rests upon probability. Because we can very

      rarely say anything meaningful with absolute certainty from data, we

      use probabilistic language to make quantitative statements about

      data. In this chapter, you will learn how to think probabilistically

      about discrete quantities: those that can only take certain values,

      like integers.'
    source: syllabus
    confidence: 1.0
  - chapter_index: 4
    title: Thinking Probabilistically-- Continuous Variables
    summary: 'It’s time to move onto continuous variables, such as those that can

      take on any fractional value. Many of the principles are the same,

      but there are some subtleties. At the end of this final chapter, you

      will be speaking the probabilistic language you need to launch into

