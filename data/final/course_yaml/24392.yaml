course_id: '24392'
title: Statistical Thinking in Python (Part 1)
normalized_course:
  course_id: '24392'
  title: Statistical Thinking in Python (Part 1)
  provider: DataCamp
  summary: 'Build the foundation you need to think statistically and to speak the

    language of your data.'
  overview: 'Graphical Exploratory Data Analysis


    Before diving into sophisticated statistical inference techniques, you

    should first explore your data by plotting them and computing simple summary

    statistics. This process, called exploratory data analysis, is a crucial

    first step in statistical analysis of data.


    Quantitative Exploratory Data Analysis


    In this chapter, you will compute useful summary statistics, which serve to

    concisely describe salient features of a dataset with a few numbers.


    Thinking Probabilistically-- Discrete Variables


    Statistical inference rests upon probability. Because we can very rarely say

    anything meaningful with absolute certainty from data, we use probabilistic

    language to make quantitative statements about data. In this chapter, you

    will learn how to think probabilistically about discrete quantities: those

    that can only take certain values, like integers.


    Thinking Probabilistically-- Continuous Variables


    It’s time to move onto continuous variables, such as those that can take on

    any fractional value. Many of the principles are the same, but there are

    some subtleties. At the end of this final chapter, you will be speaking the

    probabilistic language you need to launch into the inference techniques

    covered in the sequel to this course.'
