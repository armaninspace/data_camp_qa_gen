  canonical_answer: 'Hypothesis testing is a statistical method for using sample data
    to evaluate a claim about a population. Usually, you compare a null hypothesis
    (no effect or no difference) to an alternative hypothesis (some effect or difference).


    It matters in this course because it helps you decide whether patterns you see
    in data are likely real or could have happened by chance.


    Example: suppose you want to test whether the average income differs between two
    groups in your dataset. A hypothesis test can help you decide if the difference
    is statistically meaningful.'
