  canonical_answer: 'Exploratory factor analysis (EFA) is used when you do not yet
    know the underlying factor structure and want the data to help reveal it. Confirmatory
    factor analysis (CFA) is used when you already have a hypothesized structure and
    want to test whether the data fit that model.


    In short:

    - EFA = discover possible factors

    - CFA = test expected factors


    Use EFA early in analysis, and CFA when you want to confirm a theory or prior
    result.'
