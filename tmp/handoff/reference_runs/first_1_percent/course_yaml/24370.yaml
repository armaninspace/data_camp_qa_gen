      - favor R, ggplot2, dplyr examples
      - answer within sql in data analysis
      - avoid unrelated advanced detail unless course context supports it
      support_refs:
      - summary
      - overview
  teacher_answer: 'Conditional probability means: given that one event has already
    happened, how likely is another event? It is written as P(A | B), which means
    “the probability of A given B.”


    Mechanism:

    1. Start with the event you are conditioning on, B.

    2. Restrict your attention to only the cases where B happens.

    3. Within those cases, find how often A also happens.


    Formula:

    P(A | B) = P(A and B) / P(B), as long as P(B) > 0.


    Example: If 40 out of 100 people like R, and 20 people both like R and use SQL,
    then the probability that someone uses SQL given that they like R is:

    P(SQL | R) = 20 / 40 = 0.5.

    So among people who like R, 50% use SQL.'
  question_variants:
  - How does conditional probability work?
  answer_quality_flags:
    course_aligned: true
