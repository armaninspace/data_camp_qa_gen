  canonical_answer: A mixed effects model is a regression model that includes both
    fixed effects and random effects. Fixed effects estimate relationships you care
    about for the whole dataset, while random effects account for grouped or repeated
    data, like students within schools or repeated measurements from the same person.
    This matters because many real datasets are not fully independent, and mixed models
    help handle that structure. For example, if you model test scores using study
    hours across several schools, study hours could be a fixed effect and school could
    be a random effect.
  cache_eligible: true
