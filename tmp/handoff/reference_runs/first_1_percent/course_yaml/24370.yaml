    like students within schools. A mixed effects model is a common type of hierarchical
    model that includes both fixed effects and random effects.


    - Hierarchical model: focuses on the data structure being nested or grouped.

    - Mixed effects model: focuses on how that structure is modeled using fixed and
    random effects.


    Use hierarchical models when your data has natural groups. Use mixed effects models
    when you want to estimate overall effects and also account for group-to-group
    variation.


    In practice, these terms are often used almost interchangeably in beginner R work.'
