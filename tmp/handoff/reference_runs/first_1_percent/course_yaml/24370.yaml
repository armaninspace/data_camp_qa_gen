      course_id: '24370'
      question_text: How does conditional probability work?
      question_intent: procedure
      relevant_topics: []
      chapter_scope: []
      expected_answer_shape:
      - short procedural explanation
      - main steps or mechanism
      - one simple example
      scope_bias:
