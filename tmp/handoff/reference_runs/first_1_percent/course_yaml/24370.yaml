  canonical_answer: 'Experimental design is important because it helps you collect
    data in a way that supports fair, reliable conclusions. A good design reduces
    bias, controls sources of variation, and makes it easier to tell whether a treatment
    or change actually caused the result.


    In this course, that matters because your analysis in R is only as good as the
    data you start with. Even simple summaries, plots, or models can be misleading
    if the experiment was poorly designed.


    Example: if you want to test whether a new fertilizer increases plant growth,
    you should randomly assign plants to fertilizer and no-fertilizer groups. Then
    differences in growth are more likely due to the fertilizer, not to where the
    plants were placed.'
