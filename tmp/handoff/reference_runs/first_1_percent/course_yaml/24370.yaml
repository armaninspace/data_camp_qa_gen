    you things like who was sampled, whether weights were used, and how responses
    were grouped. The analysis then uses that information to produce better estimates
    and conclusions. In this course, they fit together because you first understand
    the survey structure, then analyze the data correctly in R. For example, if a
    survey oversamples one group, you would use the survey design information during
    analysis so your results represent the full population more fairly.
