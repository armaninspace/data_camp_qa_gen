  teacher_answer: 'Use a t-test when you want to compare the mean of a numeric variable
    across one or two groups, especially with a small sample and unknown population
    standard deviation. Common cases are:

    - one-sample t-test: compare a sample mean to a known value

    - two-sample t-test: compare the means of two groups

    - paired t-test: compare before/after measurements on the same subjects


    Example: testing whether the average exam score differs between students in two
    classes.


    In short: if your outcome is numeric and your question is about mean differences,
    a t-test is often the right choice.'
