  teacher_answer: Random effects are variables in a model that capture differences
    across groups when those groups are treated as coming from a larger population.
    They matter because they let you account for grouped or repeated data without
    estimating a separate fixed effect for every group. For example, if you model
    test scores for students in different schools, you might use school as a random
    effect so each school can have its own baseline while still being part of one
    overall model.
