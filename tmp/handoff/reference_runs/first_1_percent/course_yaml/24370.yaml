  teacher_answer: Bayesian data analysis is a way to analyze data by combining what
    you already believe or know about a problem (a prior) with the observed data to
    update that belief (the posterior). It matters because it gives a clear framework
    for making statistical conclusions under uncertainty. For example, if you think
    a coin is probably fair before collecting data, then after seeing 8 heads in 10
    flips, a Bayesian analysis updates that belief to reflect the new evidence.
  question_variants:
