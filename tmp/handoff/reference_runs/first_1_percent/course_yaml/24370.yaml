- question_id: sq_027
  question_text: What is factor analysis?
  answer_text: Factor analysis is a statistical method used to find a smaller number
    of hidden variables, called factors, that explain patterns in many observed variables.
    It matters because it helps simplify complex data and reveal underlying structure.
    For example, if a survey has many questions about stress, sleep, and mood, factor
    analysis might show that they group into one or two underlying factors such as
    mental well-being.
