  canonical_answer: 'A hierarchical model is a model for data with levels or groups
    inside groups. It lets you model both overall patterns and group-specific differences.


    Why it matters: in data analysis, many datasets are naturally grouped, such as
    students within schools or patients within hospitals. A hierarchical model helps
    account for that structure instead of treating every observation as completely
    independent.


    Example: if you model test scores for students from several schools, you might
    estimate one overall relationship plus allow each school to have its own effect.'
