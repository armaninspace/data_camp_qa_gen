  teacher_answer: 'In R, you subset a data frame using `[rows, columns]`.


    - `rows` chooses which observations to keep

    - `columns` chooses which variables to keep


    Examples:

    ```r

    my_df[1:3, ]      # first 3 rows, all columns

    my_df[, 2]        # all rows, second column

    my_df[, c("age", "score")]  # selected columns by name

    my_df[my_df$age > 30, ]  # rows where age is greater than 30

    ```


    You can leave rows or columns blank to keep all of them. This is the main way
    data frame subsetting works in R.'
