  teacher_answer: 'Vector comparison in R is used to compare each element of a vector
    to a value or to another vector. It returns a logical vector (`TRUE`/`FALSE`),
    which is very useful for subsetting and filtering data.


    Example:

    ```r

    x <- c(2, 5, 8, 1)

    x > 4

    ```

    This returns:

    ```r

    FALSE TRUE TRUE FALSE

    ```

    You can then use that result to keep only values greater than 4:

    ```r

    x[x > 4]

    ```

    which gives:

    ```r

    5 8

    ```

    So in this course, vector comparison matters because it helps you select data
    based on conditions.'
