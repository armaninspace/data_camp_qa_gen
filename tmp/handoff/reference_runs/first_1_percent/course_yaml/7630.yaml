  canonical_answer: 'Basic data types in R are the kinds of values you store in objects.
    The main ones are:

    - numeric: numbers like `3.14`

    - integer: whole numbers like `2L`

    - character: text like `"hello"`

    - logical: `TRUE` or `FALSE`

    - factor: categorical values like `"low"`, `"medium"`, `"high"`


    This matters because subsetting, comparisons, and analysis in R often depend on
    the data type. For example:

    ```r

    x <- c(1, 2, 3)      # numeric

    name <- "Ana"       # character

    passed <- TRUE       # logical

    ```

    You can check a type with `class(x)` or `typeof(x)`.'
