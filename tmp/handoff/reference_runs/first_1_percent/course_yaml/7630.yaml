  canonical_answer: 'In R, matrix computations work element-by-element or with matrix
    algebra operators, depending on the symbol you use.


    - Create a matrix with `matrix()`

    - Use `+`, `-`, `*`, `/` for element-wise computations

    - Use `%*%` for matrix multiplication

    - Many summary functions like `rowSums()`, `colSums()`, and `t()` also work with
    matrices


    Example:

    ```r

    m1 <- matrix(1:4, nrow = 2)

    m2 <- matrix(5:8, nrow = 2)


    m1 + m2   # element-wise addition

    m1 * m2   # element-wise multiplication

    m1 %*% m2 # matrix multiplication

    ```


    So the main idea is: regular arithmetic operators act on matching entries, while
    `%*%` follows matrix multiplication rules.'
  cache_eligible: true
