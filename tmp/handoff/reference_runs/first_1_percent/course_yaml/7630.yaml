  canonical_answer: 'Vector subsetting in R means selecting specific elements from
    a vector using square brackets `[]`.


    You put an index inside the brackets:

    - Positive numbers keep those positions: `x[c(1, 3)]`

    - Negative numbers remove those positions: `x[-2]`

    - Logical values keep `TRUE` positions: `x[x > 5]`


    Example:

    ```r

    x <- c(10, 20, 30, 40)

    x[2]        # 20

    x[c(1, 4)]  # 10 40

    x[x > 20]   # 30 40

    ```


    So the basic idea is: create or choose the positions you want, then place them
    inside `[]`.'
  cache_eligible: true
