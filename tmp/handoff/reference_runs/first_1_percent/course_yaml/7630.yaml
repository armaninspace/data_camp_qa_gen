  teacher_answer: 'In R, you subset a factor much like a vector, using brackets `[]`.


    Example:

    ```r

    x <- factor(c("low", "high", "medium", "low"))

    x[c(1, 4)]

    ```

    This returns the 1st and 4th factor values.


    One important detail: the original levels usually stay attached, even if some
    are not used in the subset. To remove unused levels, use `droplevels()`:

    ```r

    y <- x[c(1, 4)]

    droplevels(y)

    ```

    So the basic process is: subset with `[]`, then drop unused levels if needed.'
  question_variants:
