  teacher_answer: 'A `for` loop is used when you want to iterate over a sequence or
    a fixed range of values, like rows, columns, or `range(10)`. A `while` loop is
    used when you want to keep repeating as long as a condition stays `True`.


    Example:

    - `for i in range(5):` runs a known number of times.

    - `while x < 5:` runs until `x` no longer satisfies the condition.


    So the key difference is: `for` loops are usually for definite iteration, and
    `while` loops are for condition-based iteration.'
  question_variants:
