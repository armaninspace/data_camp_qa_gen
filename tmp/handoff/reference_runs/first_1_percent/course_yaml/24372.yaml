  teacher_answer: 'Filtering in a pandas DataFrame means selecting only the rows that
    match a condition. You usually do this by creating a Boolean mask: a Series of
    `True` and `False` values, then using it inside brackets.


    Example:

    ```python

    high_life_exp = df["life_exp"] > 70

    result = df[high_life_exp]

    ```

    Here, `high_life_exp` is `True` for rows where `life_exp` is greater than 70,
    and `df[high_life_exp]` keeps only those rows.


    You can also filter with multiple conditions using `&` (and) or `|` (or):

    ```python

    result = df[(df["life_exp"] > 70) & (df["pop"] > 1000000)]

    ```'
