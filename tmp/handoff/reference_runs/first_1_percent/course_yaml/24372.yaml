- question_id: sq_004
  question_text: When should you use a dictionary instead of a list in Python?
  answer_text: 'Use a dictionary when your data is naturally organized as key-value
    pairs and you want to look up values by name, not by position. Use a list when
    order matters and you mainly access items by index.


    Example:

    - list: `temps = [21, 24, 19]` → good if you just want the 1st, 2nd, 3rd value

    - dictionary: `temps = {''Mon'': 21, ''Tue'': 24, ''Wed'': 19}` → better if you
    want the temperature for a specific day


    In this course, dictionaries are especially useful before moving to pandas, where
    labeled data is important.'
  correctness: correct
  confidence: 1.0
  evidence: []
  source_refs:
