  teacher_answer: "Use a `while` loop when you want code to keep running until a condition\
    \ becomes false, especially if you do not know in advance how many iterations\
    \ you need. In data science, this often comes up in simple simulations or hacker\
    \ statistics.\n\nExample:\n```python\nimport numpy as np\n\ncount = 0\nheads =\
    \ 0\nwhile heads < 3:\n    if np.random.randint(0, 2) == 1:\n        heads +=\
    \ 1\n    count += 1\n\nprint(count)\n```\nHere, the loop continues until `heads`\
    \ reaches 3. If you already know the number of repetitions, a `for` loop is usually\
    \ the better choice."
