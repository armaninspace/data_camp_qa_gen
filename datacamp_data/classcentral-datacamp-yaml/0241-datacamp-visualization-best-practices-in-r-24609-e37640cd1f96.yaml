overview: |-
  Proportions of a whole

  In this chapter, we focus on visualizing proportions of a whole; we see that
  pie charts really aren't so bad, along with discussing the waffle chart and
  stacked bars for comparing multiple proportions.

  Point data

  We shift our focus now to single-observation or point data and go over when
  bar charts are appropriate and when they are not, what to use when they are
  not, and general perception-based enhancements for your charts.

  Single distributions

  We now move on to visualizing distributional data, we expose the fragility
  of histograms, discuss when it is better to shift to a kernel density plots,
  and how to make both plots work best for your data.

  Comparing distributions

  Finishing off we take a look at comparing multiple distributions to each
  other. We see why the traditional box plots are very dangerous and how to
  easily improve them, along with investigating when you should use more
  advanced alternatives like the beeswarm plot and violin plots.
