overview: |-
  From Loose Code to Local Package

  Get your package started by converting scripts you have already written.
  You'll create a simple package which you can use on your own computer.

  Install Your Package from Anywhere

  Make your package installable for yourself and others. In this chapter,
  you'll learn to deal with dependencies, write READMEs, and include licenses.
  You'll also complete all the steps to publish your package on PyPI—the main
  home of Python packages.

  Increasing Your Package Quality

  Bring your package up to a professional standard. Discover how to use pytest
  to guard against errors, tox to test if your package functions with multiple
  versions of Python, and flake8 to maintain great code style.

  Rapid Package Development

  Create your packages more quickly. In this final chapter, you’ll learn how
  to use cookiecutter to generate all the supporting files your package needs,
  Makefiles to simplify releasing new versions, and be introduced to the last
  few files your package needs to attract users and contributors.
