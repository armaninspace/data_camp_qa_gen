overview: |-
  Learn the basic concepts of Artificial Intelligence, such as machine
  learning, deep learning, NLP, generative AI, and more.

  Explore the basics of Artificial Intelligence

  AI is transforming our economy, media, industries, and society. Designed for
  beginners with no coding knowledge required, gain a straightforward
  introduction to the world of AI.

  You’ll demystify common AI buzzwords—machine learning, deep learning,
  generative AI, etc.—in a way that is easy to understand and apply.

  Overview of AI applications

  We'll journey through AI's practical applications in daily life, discover
  how organizations can integrate AI, and discuss the societal impact arising
  from AI's relentless advancement. We’ll explore also tasks that AI can
  solve, from helping run traffic more smoothly to optimizing booking systems.

  Upon completion, you'll have a comprehensive understanding of AI's
  capabilities and its influence on society​.

  The videos contain live transcripts you can reveal by clicking "Show
  transcript" at the bottom left of the videos.

  The course glossary, promotional material and detailed learning objectives
  can be found on the right in the resources section.

  To obtain CPE credits you need to complete the course and reach a score of
  70% on the qualified assessment. You can navigate to the assessment by
  clicking on the CPE credits callout on the right.
syllabus:
  - title: "What is Artificial Intelligence (AI)?"
    summary: |-
      Get started with your journey into AI! Artificial Intelligence has
      rapidly shifted from a purely scientific subject to an umbrella
      field whose applications and uses are countless as of today, be it
      in business, industry, or simply as part of our daily lives. You
      will learn what is AI, what types of problems can be solved using
      AI, and what are its current limitations. You will also gain a broad
      understanding of the subareas within AI and its related disciplines.
  - title: "Tasks AI can solve"
    summary: |-
      What are the core functions of AI systems and the possibilities each
      of its areas has to offer? Where does the data that fuels AI systems
      come from, and how do techniques like machine learning make use of
      data to solve a variety of problems? This chapter answers these
      questions and more, unveiling how different forms of AI can acquire
      data, learn from the data, and interact with its surroundings- be it
      the physical or digital environment.
  - title: "Harnessing AI in Organizations"
    summary: |-
      Get ready to plunge into the exciting world of AI in business and
      enterprise! This chapter uncovers the fundamental concepts,
      guidelines, and best practices to build or become an AI-driven
      organization. Whether it is for equipping your products, services,
      and projects with a touch of intelligence, or revolutionizing
      operational processes within your organization, by the end of this
      chapter, you will understand the essential elements to embrace this
      technology: from culture to data and infrastructure, to building
      teams of talented AI professionals. You'll also learn about
      challenges that may appear along the way and examples of success
      stories from big companies that learned to make AI a central aspect
      of their brand.
  - title: "The human side of AI"
    summary: |-
      As our thrilling AI journey comes to an end, we delve into the
      profound connection between AI and its impact on humanity and
      society. We will explore subjects like AI democratization and
      responsible AI, encompassing ethics, interpretability, fairness, and
      safety – all crucial aspects for cultivating AI systems that
      positively influence our lives. Lastly, we cast our gaze towards the
      horizon, outlining the exciting prospects and challenges AI presents
      in shaping a sustainable future.
