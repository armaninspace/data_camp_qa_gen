overview: |-
  Key-value databases

  To begin the course, you’ll learn the differences between NoSQL and
  relational databases. After that, you'll discover key-value databases, their
  advantages, and their limitations. You’ll recognize the situations in which
  key-value databases are suitable. You’ll end this chapter by studying the
  case of Editoo, a company that reduced its downtime and improved its
  performance thanks to the Redis key-value database.

  Document databases

  In this chapter, you'll learn the basics of document databases. Then, you'll
  identify the advantages and limitations of this kind of database, and you’ll
  recognize the situations in which document databases are suitable. Finally,
  you’ll end this chapter with the Shutterfly case study. They used the
  MongoDB document database to reduce latency and accelerate time to market.

  Column family databases

  You'll look at column family databases, analyzing the advantages and
  limitations of this kind of database. You'll also study the situations where
  column family databases are suitable. Finally, you'll end this chapter with
  the case study of Bigmate, a company that used the Apache Cassandra database
  to handle millions of operations by concurrent users each second.

  Graph databases

  This final chapter analyzes graph databases. You'll study the advantages and
  limitations of this kind of database and the situations where these are most
  useful. You'll end this course by looking into Gousto, a company that
  obtained better cost control thanks to the Neo4j database.
