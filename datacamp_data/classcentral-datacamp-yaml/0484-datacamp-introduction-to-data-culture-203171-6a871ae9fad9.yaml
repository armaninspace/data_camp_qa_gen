overview: |-
  Learn the key components of building a strong data culture within an
  organization.

  Learn how to build a strong data culture

  A strong data culture gives a business a competitive edge in almost any
  industry.

  This course equips you with an understanding of the concepts and practical
  applications of building your own data culture. Suited for individual
  contributors and data leaders alike, you’ll uncover how to build a data
  culture from within, its contribution to business success, and how to
  measure progress through a maturity model.

  Common challenges when building a data culture

  Uncover insights into how data infrastructure and employee engagement might
  create challenges when building your data culture. This knowledge will help
  you prepare for success in building a data culture within your organization.

  Learn the key roles and responsibilities needed to build a strong data
  culture

  Regardless of technical expertise and industry, discover how different roles
  contribute to data culture. You'll learn the essentials of becoming a data
  leader, how it differs from executives, and what characteristics make a good
  data leader.

  Upon completion, you’ll have the knowledge to empower your team to build a
  data culture that supports your organization's goals and drives success.
