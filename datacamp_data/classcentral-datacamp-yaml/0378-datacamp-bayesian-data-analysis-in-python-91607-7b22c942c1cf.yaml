overview: |-
  The Bayesian way

  Take your first steps in the Bayesian world. In this chapter, you’ll be
  introduced to the basic concepts of probability and statistical
  distributions, as well as to the famous Bayes' Theorem, the cornerstone of
  Bayesian methods. Finally, you’ll build your first Bayesian model to draw
  conclusions from randomized coin tosses.

  Bayesian estimation

  It’s time to look under the Bayesian hood. You’ll learn how to apply Bayes'
  Theorem to drug-effectiveness data to estimate the parameters of probability
  distributions using the grid approximation technique, and update these
  estimates as new data become available. Next, you’ll learn how to
  incorporate prior knowledge into the model before finally practicing the
  important skill of reporting results to a non-technical audience.

  Bayesian inference

  Apply your newly acquired Bayesian data analysis skills to solve real-world
  business challenges. You’ll work with online sales marketing data to conduct
  A/B tests, decision analysis, and forecasting with linear regression models.

  Bayesian linear regression with pyMC3

  In this final chapter, you’ll take advantage of the powerful PyMC3 package
  to easily fit Bayesian regression models, conduct sanity checks on a model's
  convergence, select between competing models, and generate predictions for
  new data. To wrap up, you’ll apply what you’ve learned to find the optimal
  price for avocados in a Bayesian data analysis case study. Good luck!
