overview: |-
  Introducing TensorFlow in R

  -Let's get you started in TensorFlow! To begin the course, you'll learn the
  history of the program and will become comfortable using TensorFlow syntax.
  You'll become versed in TensorFlow constants, placeholders, and Variables
  and we'll explore some dataflow diagrams using TensorBoard, the TensorFlow
  visualization tool! This chapter is a great start to get you comfortable
  with using TensorFlow in R.

  Linear Regression using two TensorFlow APIs

  -Have you ever wondered if we can predict beer consumption in university
  towns based on weather factors, such as temperature, precipitation, or time
  of week? Well then do I have a chapter for you!

  In this chapter, we'll explore linear regression models using both the Core
  TensorFlow API, as well as the Estimators API (a high-level API with canned
  models set to speed up the user experience). We'll train and evaluate
  several models to get you familiar with all the APIs TensorFlow has to
  offer.

  And you'll finally be able to answer - do people drink less beer when it's
  rainy out?

  Deep Learning in TensorFlow: Creating a Deep Neural Network

  -Let’s dive into some deep learning with TensorFlow! In this chapter, you’ll
  create a complete end-to-end DNN Classifier with the Keras API, exploring if
  you can predict online customer buy/don’t buy behaviour. Want to see
  behind-the-scenes of your classifier? TensorBoard is your answer. You’ll
  explore scalars and graphs in TensorBoard and take a closer look at the
  visualizations directly available in R. Finish off the chapter with a
  glimpse into using a canned DNN Classifier in Estimators. Which is the
  better API for your model? You decide!

  Deep learning in TensorFlow: increasing model accuracy

  -Now that you've successfully created your first DNN models using TensorFlow
  in R, it's time to branch out and look at some ways to increase the accuracy
  of your models. In this chapter, you'll explore a few regularization
  techniques, including incorporating a Ridge Regression into a Keras model
  and adding a Dropout technique to an Estimators canned DNN. Finally, we'll
  wrap up this course by summarizing all the concepts you've learned, and give
  you some research ideas for you to try on your own!
