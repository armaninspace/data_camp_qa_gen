overview: |-
  Data storytelling is a high-demand skill that elevates analytics. Learn
  narrative building and visualizations in this course with a college major
  dataset!

  Stories are all around us! In the data world, stories help us solve business
  problems and convey valuable findings to stakeholders. Although often
  overshadowed by flashier technical topics such as ML and deep learning, data
  storytelling is a high-demand skill that evolves your analytical skills and
  deliverables from informative to insightful. This is why publications like
  the Harvard Business Review consistently reports data storytelling on top of
  any data professional's requirements list.

  In this course, you will complete a case study to learn the fundamentals of
  data storytelling and why it's important in analytics. You'll have the
  opportunity to learn key elements to include in every data story such as
  building narrative arcs, establishing a data foundation, and leveraging
  visualizations. In this case study on college graduate outcomes, students
  will evolve their findings across multiple data story maturity levels for
  optimal and accessible value claims, and actionable insights.

  At the conclusion of the course, you will have the necessary skills to
  provide data-driven impact by coupling your technical skills with
  communication maturity and professionalism.
