overview: |-
  Data visualization is one of the most desired skills for data analysts. This
  course allows you to present your findings better using Tableau.

  Becoming a Data Analyst

  Data visualization is one of the most desired skills for data analysts,
  allowing them to communicate insights in an understandable and impactful
  way. This course covers a range of data visualization skills using Tableau,
  allowing you to better present your findings.

  If you’re interested in data visualization or if you struggle to make your
  insights “land” with your stakeholders, then this course is for you.

  Discover How to Use Data Visualization

  You’ll start by revisiting some of the core principles of visualizing data
  before learning the basics of Tableau, looking at how you can use the
  software to transform your data into something impactful.

  You’ll cover some of the data visualization best practices, as well as focus
  on how to make your Tableau dashboards interactive and appealing. As you
  progress, you’ll explore how to spatial data to chart maps and non-geo use
  cases.

  Learn to Communicate Insights

  Communicating your insights visually will increase the understanding and
  retention of your information and create more impact. In this course, you
  will progress from basic data visualization skills toward advanced and
  custom-made charts, including Waffle charts, DNA charts, and a Sankey
  charts.

  You’ll learn how to accentuate insights and how to render information
  beautiful and useful at the same time. And all this while working on
  interesting datasets such as IMDB Movies or Airbnb data. Let’s visualize!
syllabus:
  - title: "Start to Visualize"
    summary: |-
      In this chapter, we revisit the core principles of data
      visualization and learn how to use Tableau to turn your data into
      informative, useful, and attractive charts, from basic to more
      intermediate ones.
  - title: "Best Practices in Data Visualization"
    summary: |-
      Having already explored the first steps in data visualization, you
      will go through a practical course on best charting practices and
      learn the dos and don’ts. You will also focus on increasing the
      interactivity of our visualizations by using dashboard actions to
      your advantage.
  - title: "Maps and Spatial Visualizations"
    summary: |-
      This chapter focuses on map charting, starting with classic
      geospatial visualizations and progressing to non-geo use cases, such
      as visualizing schematics, processes, or traffic. You will also
      learn how to work with spatial data types and how to beautify your
      maps.
  - title: "Information is Beautiful – Expanding your Charting Toolbox"
    summary: |-
      In the final Chapter, you will focus on expanding your visualization
      toolbox with more fancy charts. You will learn how to build, among
      others, a Waffle chart, DNA chart, and a Sankey chart, and learn how
      to style them and assemble them into a brand-consistent infographic
      or dashboard with intuitive navigation. Finally, you will pick a few
      takeaways from the analysis and assemble them into a data story.
