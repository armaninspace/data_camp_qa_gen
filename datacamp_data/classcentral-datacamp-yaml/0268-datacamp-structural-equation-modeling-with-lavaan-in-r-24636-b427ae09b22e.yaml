overview: |-
  One-Factor Models

  In this chapter, you will dive into creating your first structural equation
  model with lavaan. You will learn important terminology, how to build, and
  run models. You will create a one-factor model of mental test abilities
  using the classic Holzinger and Swineford (1939) dataset.

  Multi-Factor Models

  In this chapter, you will expand your skills in lavaan to creating
  multi-factor models. We will improve the one-factor models from the last
  chapter by creating multiple latent variables in the classic Holzinger and
  Swineford (1939) dataset.

  Troubleshooting Model Errors and Diagrams

  Structural equation models do not always run smoothly, and in this chapter,
  you will learn how to troubleshoot Heywood cases which are common errors.
  You will also learn how to diagram your model in R using the semPlot
  library.

  Full Example and an Extension

  This chapter examines the WAIS-III IQ Scale and its structural properties.
  You will use your skills from the first three chapters to create various
  models of the WAIS-III, troubleshoot errors in those models, and create
  diagrams of the final model.
