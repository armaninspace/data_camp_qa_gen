overview: |-
  Level up your SQL knowledge and learn to join tables together, apply
  relational set theory, and work with subqueries.

  Joining data is an essential skill in data analysis, enabling you to draw
  information from separate tables together into a single, meaningful set of
  results. In this comprehensive course on joining data, you'll delve into the
  intricacies of table joins and relational set theory, learning how to
  optimize your queries for efficient data retrieval.

  Understand Data Joining Fundamentals

  You will learn how to work with multiple tables in SQL by navigating and
  extracting data from various tables within a SQL database using various join
  types, including inner joins, outer joins, and cross joins. With practice,
  you'll gain the knowledge of how to select the appropriate join method.

  Explore Advanced Data Manipulation Techniques

  Next up, you'll explore set theory principles such as unions, intersects,
  and except clauses, as well as discover the power of nested queries in SQL.

  Every step is accompanied by exercises and opportunities to apply the theory
  and grow your confidence in SQL.
syllabus:
  - title: "Introducing Inner Joins"
    summary: |-
      In this chapter, you’ll be introduced to the concept of joining
      tables and will explore all the ways you can enrich your queries
      using joins—beginning with inner joins.
  - title: "Outer Joins, Cross Joins and Self Joins"
    summary: |-
      After familiarizing yourself with inner joins, you will come to
      grips with different kinds of outer joins. Next, you will learn
      about cross joins. Finally, you will learn about situations in which
      you might join a table with itself.
  - title: "Set Theory for SQL Joins"
    summary: |-
      In this chapter, you will learn about using set theory operations in
      SQL, with an introduction to UNION, UNION ALL, INTERSECT, and EXCEPT
      clauses. You’ll explore the predominant ways in which set theory
      operations differ from join operations.
  - title: Subqueries
    summary: |-
      In this closing chapter, you’ll begin by investigating semi-joins
      and anti-joins. Next, you'll learn how to use nested queries. Last
      but not least, you’ll wrap up the course with some challenges!
