overview: |-
  Putting Files in the Cloud!

  Embark on the world of cloud technology! From learning how AWS works to
  creating S3 buckets and uploading files to them. You will master the basics
  of setting up AWS and uploading files to the cloud!

  Sharing Files Securely

  Continue your journey in mastering AWS by learning how to upload and share
  files securely. You will learn how set files to be public or private, and
  cap off what you learned by generating web-based reports!

  Reporting and Notifying!

  Next, you will learn how to automate sharing your findings with the world by
  building notification triggers for your analysis! You will learn how to
  harness AWS to send SMS and email notifications to users and cap off what
  you learned by making custom notifications depending on a user's needs.

  Pattern Rekognition

  Finally, you will go beyond uploading, sharing and notifying into
  rekognizing using AWS Rekognition and other AWS machine learning services to
  recognize cats, translate language and detect sentiment. You will be capping
  off your learning journey by applying a real-world use case that mixes
  everything you've learned!
