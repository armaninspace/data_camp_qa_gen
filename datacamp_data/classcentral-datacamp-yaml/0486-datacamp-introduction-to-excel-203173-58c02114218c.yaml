overview: |-
  Master the Excel basics and learn to use this spreadsheet tool to conduct
  impactful analysis.

  Getting started with Excel

  In this Excel course, you’ll learn the fundamentals needed to have you
  analyzing data in spreadsheets before you know it. This course focuses on
  helping you navigate Excel and prepare your data for basic analysis. You’ll
  learn how to manage tables and apply calculations to your data to provide
  new insights

  Learn Functions

  You’ll learn about the many available functions in Excel that can help you
  to perform calculations, analyze data and, in some cases, automate tasks.
  We’ll start your journey into understanding the full potential of Excel’s
  functions and leverage built-ins such as SUM, AVERAGE, COUNT, UPPER, LEFT,
  and more.

  Visualizing data

  We’ll finish this course by explaining the basics of using Excel to
  effectively communicate data through compelling visuals. You’ll explore the
  versatility of area, column, and pie charts to help tell a story to bring
  your analysis to life.
syllabus:
  - title: "Getting started with Excel"
    summary: |-
      In this chapter, you’ll learn how to navigate Excel and understand
      how best to work with tables. You will cover topics such as
      navigating the grid layout, importing data, manipulating data with
      tables, and creating basic formulas.
  - title: "Managing data and applying aggregate functions"
    summary: |-
      In this chapter, you’ll learn how to work with data in a tabular
      layout. You will cover topics such as creating named ranges, using
      subtotals to summarize groups of data, and applying data validation
      rules. Additionally, you’ll learn how to use aggregate functions in
      Excel to help summarize your data.
  - title: "Other functions and visualizing data"
    summary: |-
      Finally, in this chapter, we’ll finish by looking at the various
      functions available within Excel and learn how to start visualizing
      basic data. You will cover text, date and time, statistical
      functions, and learning to use built-in Excel features to visualize
      your data.
