overview: |-
  No one enjoys looking at spreadsheets! Bring your data to life. Improve your
  presentation and learn how to translate technical data into actionable
  insights.

  Learn the Basics of Data Communication

  You’ve analyzed your data, run your model, and made your predictions. Now,
  it's time to bring your data to life! Presenting findings to stakeholders so
  they can make data-driven decisions is an essential skill for all data
  scientists. In this course, you’ll learn how to use storytelling to connect
  with your audience and help them understand the content of your
  presentation—so they can make the right decisions.

  Explore Formats of Data Communication

  Through hands-on exercises, you’ll learn the advantages and disadvantages of
  oral and written formats. You’ll also improve how you translate technical
  results into compelling stories, using the correct data, visualizations, and
  in-person presentation techniques. Start learning and improve your data
  storytelling today.
syllabus:
  - title: "Storytelling with Data"
    summary: |-
      Let's start with the importance of data storytelling and the
      elements you need to tell stories with data. You'll learn best
      practices to influence how decisions are made before learning how to
      translate technical results into stories for non-technical
      stakeholders.
  - title: "Preparing to Communicate the Data"
    summary: |-
      Deepen your storytelling knowledge. Learn how to avoid common
      mistakes when telling stories with data by tailoring your
      presentations to your audience. Then learn best practices for
      including visualizations and choosing between oral or written
      formats to make sure your presentations pack a punch!
  - title: "Structuring Written Reports"
    summary: |-
      Now that you understand how to prepare for communicating findings,
      it’s time to learn how to structure your reports. You'll also learn
      the importance of reproducibility (work smarter, not harder) and how
      to get to the point when describing your findings. You’ll then get
      to apply all you’ve learned to a real-world use case as you create a
      compelling report on credit risk.
  - title: "Building Compelling Oral Presentations"
    summary: |-
      You'll finish by learning simple techniques to structure a
      presentation, communicate insights, and inspire your audience to
      take action. Lastly, you'll learn how to improve your communication
      style and prepare to handle questions from your audience.
