overview: |-
  Statistics

  A picture paints a thousand words, which is why R ggplot2 is such a powerful
  tool for graphical data analysis. In this chapter, you’ll progress from
  simply plotting data to applying a variety of statistical methods. These
  include a variety of linear models, descriptive and inferential statistics
  (mean, standard deviation and confidence intervals) and custom functions.

  Coordinates

  The Coordinates layers offer specific and very useful tools for efficiently
  and accurately communicating data. Here we’ll look at the various ways of
  effectively using these layers, so you can clearly visualize lognormal
  datasets, variables with units, and periodic data.

  Facets

  Facets let you split plots into multiple panes, each displaying subsets of
  the dataset. Here you'll learn how to wrap facets and arrange them in a
  grid, as well as providing custom labeling.

  Best Practices

  Now that you have the technical skills to make great visualizations, it’s
  important that you make them as meaningful as possible. In this chapter,
  you’ll review three plot types that are commonly discouraged in the data viz
  community: heat maps, pie charts, and dynamite plots. You’ll learn the
  pitfalls with these plots and how to avoid making these mistakes yourself.
