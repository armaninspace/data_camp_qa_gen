overview: |-
  Customizing plots

  -Following a review of basic plotting with Matplotlib, this chapter delves
  into customizing plots using Matplotlib. This includes overlaying plots,
  making subplots, controlling axes, adding legends and annotations, and using
  different plot styles.

  Plotting 2D arrays

  -This chapter showcases various techniques for visualizing two-dimensional
  arrays. This includes the use, presentation, and orientation of grids for
  representing two-variable functions followed by discussions of pseudocolor
  plots, contour plots, color maps, two-dimensional histograms, and images.

  Statistical plots with Seaborn

  -This is a high-level tour of the seaborn plotting library for producing
  statistical graphics in Python. We’ll cover seaborn tools for computing and
  visualizing linear regressions, as well as tools for visualizing univariate
  distributions (like strip, swarm, and violin plots) and multivariate
  distributions (like joint plots, pair plots, and heatmaps). We’ll also
  discuss grouping categories in plots.

  Analyzing time series and images

  -This chapter ties together the skills gained so far through examining time
  series data and images. You’ll customize plots of stock data, generate
  histograms of image pixel intensities, and enhance image contrast through
  histogram equalization.
