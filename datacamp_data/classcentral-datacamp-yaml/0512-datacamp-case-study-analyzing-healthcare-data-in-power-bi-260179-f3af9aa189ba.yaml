overview: |-
  Practice Power BI with our healthcare case study. Analyze data, uncover
  efficiency insights, and build a dashboard.

  In healthcare, improving efficiency while maintaining high-quality patient
  care is a top priority.

  Use Power BI to Analyze Healthcare Data

  In this Power BI Case study, you’ll explore a real-world dataset to uncover
  hospital efficiency insights for a fictional consulting company called
  HealthStat.

  Leverage Your DAX Skills

  You’ll analyze attributes impacting the patient length of stay (LOS) and
  cost and work to identify factors contributing to hospital differences.
  You’ll leverage your DAX skills to create measures and generate insightful
  visualizations.

  Create a Healthcare Dashboard

  To finish off, you’ll bring it all together in a sophisticated business
  dashboard to communicate insights for the HealthStat team. This case study
  gives you a chance to practice a range of Power BI skills, working with
  real-world data.
syllabus:
  - title: "Healthcare Analysis with Power BI"
    summary: |-
      To kick off this case study, you’ll bring the data into Power BI and
      connect your data model. You’ll learn about measuring efficiency in
      healthcare, and after a quick check-up on the dataset content,
      you’ll get started with some initial exploratory analytics. Then,
      you’ll leverage your DAX skills to create calculated measures and
      columns.
  - title: "Analyzing Hospital Performance and Benchmarking"
    summary: |-
      Roll up your sleeves and scrub in—it’s time to get operating on some
      insights! This chapter is all about identifying hospital performance
      outliers and revealing what attributes most influence length of stay
      and cost per patient discharge. Along the way, you’ll sharpen your
      DAX skills by building some more complex measures and calculated
      tables.
  - title: "Creating a dynamic dashboard"
    summary: |-
      In this final chapter, you’ll focus on building your final dashboard
      into a cohesive and interactive report. You’ll incorporate the
      HealthStat branding for an appealing display, optimize user-friendly
      navigation features, and close off by adding a dynamic title.
