overview: |-
  In this case study, you’ll use visualization techniques to find out what
  skills are most in-demand for data scientists, data analysts, and data
  engineers.

  Utilize Your Skills with a Tableau Case Study

  In this Tableau case study, you’ll explore a real-world job posting dataset
  to uncover insights for a fictional recruitment company called DataSearch.
  Using what you’ve learned from previous courses, you’ll use visualization
  techniques to investigate the data to find out what skills are most
  in-demand for data scientists, data analysts, and data engineers.

  Use Tableau to Gain Data Insights

  You’ll start by importing and cleaning a dataset, making sure it’s prepared
  for data exploration.

  You’ll then use filters and calculated fields to build insightful
  visualizations of your findings, allowing for trend analysis.

  Create Tableau Dashboards to Present Your Work

  Finally, you’ll bring it all together using Tableau's powerful dashboard
  capabilities so that you can answer questions for the DataSearch team.

  By practicing the techniques you’ve learned so far, this Tableau case study
  gives you the chance to get some hands-on practice with a dataset. Once
  you’ve finished the course, you’ll be more confident using Tableau to
  present your data insights.
