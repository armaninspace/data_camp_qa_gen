overview: |-
  Basic plotting with Bokeh

  -This chapter provides an introduction to basic plotting with Bokeh. You
  will create your first plots, learn about different data formats Bokeh
  understands, and make visual customizations for selections and mouse
  hovering.

  Layouts, Interactions, and Annotations

  -Learn how to combine multiple Bokeh plots into different kinds of layouts
  on a page, how to easily link different plots together, and how to add
  annotations such as legends and hover tooltips.

  Building interactive apps with Bokeh

  -Bokeh server applications allow you to connect all of the powerful Python
  libraries for data science and analytics, such as NumPy and pandas to create
  rich, interactive Bokeh visualizations. Learn about Bokeh's built-in
  widgets, how to add them to Bokeh documents alongside plots, and how to
  connect everything to real Python code using the Bokeh server.

  Putting It All Together! A Case Study

  -In this final chapter, you'll build a more sophisticated Bokeh data
  exploration application from the ground up based on the famous Gapminder
  dataset.
