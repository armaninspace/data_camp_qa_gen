overview: |-
  Get Started with Shiny

  To kick off the course you'll learn what a web app is and when you should
  build one, plus build a few apps of your own! You'll first learn to make
  text inputs and outputs in a few ways, including exploring the popularity of
  certain names over time.

  Inputs, Outputs, and Layouts

  In this chapter you will learn how to take advantage of different input and
  output options in shiny. You''ll learn the syntax for taking inputs from
  users and rendering different kinds of outputs, including text, plots, and
  tables.

  Reactive Programming

  In this chapter, you will learn about reactive programming. You will learn
  about reactive sources, conductors and endpoints and how they come together
  to drive the magic behind Shiny. You will also learn how to utilize your
  understanding of reactivity to build performant Shiny apps.

  Build Shiny Apps

  It’s time to build your own Shiny apps. You’ll make several apps from
  scratch, including one that allows you to gather insights from the Mental
  Health in Tech Survey and another that uses recipe ingredients as its input
  to accurately categorize different cuisines of the world. Along the way,
  you’ll also learn about more advanced input and output widgets, such as
  input validation, word clouds, and interactive maps.
