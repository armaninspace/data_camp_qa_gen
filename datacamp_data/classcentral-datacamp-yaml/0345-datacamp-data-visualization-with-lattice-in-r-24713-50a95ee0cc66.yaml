overview: |-
  Basic plotting with lattice

  -Introduction to some basic plotting functions in lattice. Draw histograms,
  scatter plots, density plots, and box and whisker plots.

  Conditioning and the formula interface

  -These exercises will teach you to create "conditioned" plots consisting of
  multiple panels using the formula interface.

  Controlling scales and graphical parameters

  -Learn how to control and customize axis limits and visual appearance.

  Customizing plots using panel functions

  -Learn to use panel and prepanel functions to enhance existing displays or
  create new ones.

  Extensions and the lattice ecosystem

  -The lattice package is not just meant to be used as a standalone collection
  of plotting functions. Rather, it is a framework that is used as a base by
  many other packages. Some of these are very specialized and beyond the scope
  of this course. Here we give a brief survey of extensions that are generally
  useful to enhance displays or create new ones.
