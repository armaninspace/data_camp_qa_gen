overview: |-
  Dive into our Tableau case study on supply chain analytics. Tackle shipment,
  inventory management, and dashboard creation to drive business improvements.

  Use Tableau for Supply Chain Analysis

  Test your Tableau skills on a real-world dataset focusing on supply chain
  analytics. In this case study, you will help solve key challenges of
  shipment and inventory management, analyze supply chain inefficiencies and
  create insightful dashboards to inform business stakeholders about the
  potential problems and propose structural business improvements.

  Create Tableau Dashboards to Show Your Findings

  Throughout this case study, you will use a wide range of Tableau skills,
  including calculations, visualizations, to draw insights on the data. You
  will then bring your findings together to create interactive dashboards that
  demonstrate clear insights.

  Gain Hands-On Tableau Experience

  This analytics case study gives you the chance to demonstrate your abilities
  in varies areas of Tableau. By the time you’re finished, you’ll have worked
  through an entire practical example of how to use the tool in a supply chain
  setting.
