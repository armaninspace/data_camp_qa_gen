overview: |-
  Learn how to perform financial analysis in Power BI or apply any existing
  financial skills using Power BI data visualizations.

  This course will teach you basic and intermediate finance skills and how to
  apply them in Power BI dashboards.

  Learn the Fundamentals of Financial Analysis in Power BI

  You’ll start by reviewing some basic financial terms and calculations, as
  well as exploring dashboarding. As you progress, you’ll learn how to use
  artificial intelligence to create insightful visualizations and financial
  forecasts.

  You’ll also learn how to use what-if parameters in scenarios and sensitivity
  analysis with financial data. You will explore the concept of the time value
  of money and its importance in financial analysis, as well as capital
  budgeting tools to make investment decisions that you can take with you both
  in your personal and professional life.

  Gain the Skills to Perform Your Own Financial Analyses

  By the end of this course, you will be confident in your financial skills
  and especially in your ability to create meaningful financial analyses and
  visualizations within Power BI. You’ll have the skills to use Power BI to
  analyze your own data sets.
