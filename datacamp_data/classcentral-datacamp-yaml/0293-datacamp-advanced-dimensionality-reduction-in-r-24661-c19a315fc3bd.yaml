overview: |-
  Introduction to Advanced Dimensionality Reduction

  -Are you ready to become a master of dimensionality reduction?

  In this chapter, you'll start by understanding how to represent handwritten
  digits using the MNIST dataset. You will learn what a distance metric is and
  which ones are the most common, along with the problems that arise with the
  curse of dimensionality.

  Finally, you will compare the application of PCA and t-SNE .

  Introduction to t-SNE

  -Now, you will learn how to apply the t-Distributed Stochastic Neighbour
  Embedding (t-SNE) algorithm. After finishing this chapter, you will
  understand the different hyperparameters that have an impact on your results
  and how to optimize them. Finally, you will do something really cool:
  compute centroids prototypes of each digit to classify other digits.

  Using t-SNE with Predictive Models

  -In this chapter, you'll apply t-SNE to train predictive models faster. This
  is one of the many advantages of dimensionality reduction. You will learn
  how to train a random forest with the original features and with the
  embedded features and compare them. You will also apply t-SNE to understand
  the patterns learned by a neural network. And all of this using a real
  credit card fraud dataset!

  Generalized Low Rank Models (GLRM)

  -In the final chapter, you will practice another useful dimensionality
  reduction algorithm: GLRM. Here you will make use of the Fashion MNIST data
  to classify clothes, impute missing data and also train random forests using
  the low dimensional embedding.
