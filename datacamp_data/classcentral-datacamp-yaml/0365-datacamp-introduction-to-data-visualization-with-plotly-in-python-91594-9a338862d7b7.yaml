overview: |-
  Introduction to Plotly

  Enter the world of Plotly! In this first chapter, you’ll learn different
  ways to create plots and receive an introduction to univariate plots. You’ll
  then build several popular plot types, including box plots and histograms,
  and discover how to style them using the Plotly color options.

  Customizing Plots

  Add to your Plotly toolkit as you explore and implement bivariate plots.
  Next, you’ll explore how to customize your plots to make them look amazing
  with annotations, hover information, legends, and custom axis titles and
  scales.

  Advanced Customization

  Take your Plotly graphs to the next level with more advanced customizations.
  Through hands-on exercises, you'll learn how to layer multiple interactive
  chart types in the same plot (such as a bar chart with a line chart over the
  top). You'll then create time-series selectors, such as year to date (YTD),
  to help you zoom in and out of your line charts.

  Advanced Interactivity

  In this final chapter, you'll harness Plotly's advanced user interactivity
  as you learn how to create buttons, dropdowns, and sliders that change
  everything from graph types to annotations and much more. Take your Plotly
  skills to the next level and build truly interactive user experiences.
