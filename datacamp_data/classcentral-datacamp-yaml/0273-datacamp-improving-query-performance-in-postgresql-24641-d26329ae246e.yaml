overview: |-
  Bringing Together the Data

  Bundle up as you dive into the Winter Olympics! You will learn how to join,
  subquery, and create temporary tables while finding which Olympic athletes
  brave sub-freezing temperatures to train. You will also learn about the
  query planner and how its functionality can guide your SQL structure to
  faster queries.

  Minimizing Results and Decreasing the Load

  Dig up those past algebra memories while learning the SQL order of
  operations. Find which countries "should" have the most athletes by looking
  at population and gross domestic product (GDP) while learning the best way
  to filter. You will also learn when your query aggregates (sums, counts,
  etc.) and how you can structure your query to optimize this process.

  Using Database Designed Properties

  Zero in on the properties that improve database performance. Discover when
  your table is not a table but a view. Learn how your database's storage
  structure (row or column oriented) impacts your query structure. You will
  explore volcanic smog while using partitions and indexes to speed your
  queries.

  Assessing Query Performance

  Learn the lingo of the Query Lifecycle and dive into the query planner.
  Explore how the query planner creates and optimizes the query plan. Find
  your next vacation locale by looking for countries with recent population
  growth while also seeing how a join impacts the query steps. Fine tune your
  optimization techniques by seeing how different filters speed your query
  times.
