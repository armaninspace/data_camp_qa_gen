overview: |-
  Power BI Reports

  You've built compelling dashboards in Power BI, but that's not all you can
  do. In this first chapter, you’ll learn the differences between reports and
  dashboards. Next, you'll add drill-through filters to your Power BI report
  to increase user interaction.

  Bookmarks, Buttons and Navigation

  In this chapter, you’ll learn to add interactive story-telling to your
  reports with bookmarks, buttons and navigation.

  Customizing the Experience

  Now it's time to customize the look and feel of buttons and tables using
  unicode and emojis in tables. You’ll also change how visuals interact with
  one another and see how conditional formatting can be a powerful tool for
  your report.

  Customize a Report with Q&A

  Asking a question in natural language is sometimes the quickest way to get
  an answer from your data. In this chapter, you'll learn how to add and tweak
  the Q&A visual to your Power BI Reports.
