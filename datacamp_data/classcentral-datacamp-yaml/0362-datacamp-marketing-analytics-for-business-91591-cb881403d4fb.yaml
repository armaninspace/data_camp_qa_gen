overview: |-
  Marketing Levers and Questions

  What does a marketing analyst do? Why is this role in high demand? In this
  chapter, you’ll learn about roles and business questions that a marketing
  analyst encounters. From revenue impact to campaign insights—you'll find
  that marketers will never run out of problems to analyze.

  Marketing Data Challenges

  Marketing analytics is not for the faint of heart! Between numerous data
  sources and ever-increasing privacy legislation, marketing analysts must
  consider multiple factors in reporting. Add in measuring the indirect impact
  of marketing, and you’ll see why marketing analysts get extremely
  comfortable with imperfect data.

  Marketing Campaign Analysis

  Now that you know more about the marketing analytics landscape, let's talk
  about how you can use it to assess campaign performance. To do this, you’ll
  dive into text and sentiment analysis, audience segmentation, and predictive
  analytics. Marketers and executives rely on analytics to send the right
  message to the right people at the right time.

  Marketing ROI

  The big question every marketer asks is "did my marketing efforts make any
  money?" To answer that question you'll have to consider: seasonal patterns,
  business model, campaign goals, and ROI. Most importantly, you’ll be
  responsible for setting and measuring KPIs to evaluate marketing
  effectiveness.
