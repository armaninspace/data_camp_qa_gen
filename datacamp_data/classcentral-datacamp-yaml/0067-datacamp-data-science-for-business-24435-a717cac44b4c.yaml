overview: |-
  Learn about data science for managers and businesses and how to use data to
  strengthen your organization.

  Learn to Use Data Science for Business

  What is data science, and how can you use it to strengthen your
  organization? This course will teach you about the skills you need on your
  data team and how you can structure that team to meet your organization's
  needs.

  This course will also provide you with an understanding of data sources your
  company can use and how to store, analyze, and visualize that data.

  Understand the Data Science Workflow

  You’ll start with an introduction to data science for businesses, looking at
  the data science workflow and how to apply it to real-world problems. You’ll
  also explore how data collection works, looking at how you can source and
  store data.

  Learn to Analyze and Visualize Your Data

  You'll also discover ways to analyze and visualize your data through
  dashboards and A/B tests. To wrap up the course, we'll discuss exciting
  topics in machine learning, including clustering, time series prediction,
  natural language processing (NLP), deep learning, and explainable AI.

  Along the way, you'll learn about a variety of real-world applications of
  data science and gain a better understanding of these concepts through
  practical exercises.

  This is an ideal introduction to data science for managers, giving you the
  chance to learn about this powerful business tool.
syllabus:
  - title: "Introduction to Data Science"
    summary: |-
      We'll start the course by defining what data science is. We'll cover
      the data science workflow, and how data science is applied to
      real-world business problems. We'll finish the chapter by learning
      about ways to structure your data team to meet your organization's
      needs.
  - title: "Data Collection and Storage"
    summary: |-
      Now that we understand the data science workflow, we'll dive deeper
      into the first step: data collection. We'll learn about the
      different data sources your company can draw from, and how to store
      that data once it's collected.
  - title: "Analysis and Visualization"
    summary: |-
      In this chapter, we'll discuss ways to explore and visualize data
      through dashboards. We'll discuss the elements of a dashboard and
      how to make a directed request for a dashboard. This chapter will
      also cover making ad hoc data requests and A/B tests, which are a
      powerful analytics tool that de-risk decision-making.
  - title: Prediction
    summary: |-
      In this final chapter, we'll discuss the buzziest topic in data
      science: machine learning! We'll cover supervised and unsupervised
      machine learning, and clustering. Then, we'll move on to special
      topics in machine learning, including time series prediction,
      natural language processing, deep learning, and explainable AI!
