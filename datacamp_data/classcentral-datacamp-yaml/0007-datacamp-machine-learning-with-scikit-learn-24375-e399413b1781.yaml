overview: |-
  Classification

  -In this chapter, you will be introduced to classification problems and
  learn how to solve them using supervised learning techniques. And you’ll
  apply what you learn to a political dataset, where you classify the party
  affiliation of United States congressmen based on their voting records.

  Regression

  -In the previous chapter, you used image and political datasets to predict
  binary and multiclass outcomes. But what if your problem requires a
  continuous outcome? Regression is best suited to solving such problems. You
  will learn about fundamental concepts in regression and apply them to
  predict the life expectancy in a given country using Gapminder data.

  Fine-tuning your model

  -Having trained your model, your next task is to evaluate its performance.
  In this chapter, you will learn about some of the other metrics available in
  scikit-learn that will allow you to assess your model's performance in a
  more nuanced manner. Next, learn to optimize your classification and
  regression models using hyperparameter tuning.

  Preprocessing and pipelines

  -This chapter introduces pipelines, and how scikit-learn allows for
  transformers and estimators to be chained together and used as a single
  unit. Preprocessing techniques will be introduced as a way to enhance model
  performance, and pipelines will tie together concepts from previous
  chapters.
