overview: |-
  Apply your skills to import, analyze and visualize Human Resources (HR) data
  using Power BI.

  Apply Your Skills with a Power BI Case Study

  In this Power BI case study, you will be exploring a dataset for a
  fictitious software company called Atlas Labs. This course focuses on
  helping you import, analyze and visualize Human Resources data in Power BI.
  Building on your existing knowledge of the platform, you'll learn how to
  effectively work with Power BI using example data.

  Carry Out Exploratory Data Analysis

  You’ll carry out exploratory data analysis and will use DAX to help build
  powerful visualizations. You’ll finish your analysis by diving deeper into
  attrition and what factors impact attrition. This analysis will help the
  organization determine what action they will need to take to retain more
  employees.

  Build Branded Power BI Reports

  We’ll finalize the case study by making design changes to our report that
  provide a clean, branded design.
syllabus:
  - title: "Data Modeling and EDA"
    summary: |-
      In this chapter, you’ll start by bringing all your data into Power
      BI and connecting your data model. Once your data is ready, you’ll
      start by rolling your sleeves up and doing some initial exploratory
      data analysis on general HR trends.
  - title: "Analyzing Demographics and Performance"
    summary: |-
      This chapter is about using your Power BI skills to extract insights
      using DAX and learn how to build custom visuals that you can use
      throughout your report. Atlas Labs would like some answers on its
      employee demographics and performance. Luckily, they have you on
      their team as a Data Analyst to help them explore their data
      further.
  - title: "Bringing it all together"
    summary: |-
      It’s almost time to deliver your report to the key stakeholders at
      Atlas Labs. In this final chapter, you’ll be focusing on delivering
      insights on attrition and what factors affect employee retention.
      Finally, you’ll be cleaning up the overall layout of the report to
      create a user-friendly, clean, and branded experience.
