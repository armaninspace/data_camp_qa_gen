overview: |-
  Revenue, Cost, and Profit

  Profit is one of the first things people use to assess a company's success.
  In this chapter, you'll learn how to calculate revenue and cost, and then
  combine the two calculations using Common Table Expressions to calculate
  profit.

  User-Centric KPIs

  Financial KPIs like profit are important, but they don't speak to user
  activity and engagement. In this chapter, you'll learn how to calculate the
  registrations and active users KPIs, and use window functions to calculate
  the user growth and retention rates.

  ARPU, Histograms, and Percentiles

  Since a KPI is a single number, it can't describe how data is distributed.
  In this chapter, you'll learn about unit economics, histograms, bucketing,
  and percentiles, which you can use to spot the variance in user behaviors.

  Generating an Executive Report

  Executives often use the KPIs you've calculated in the three previous
  chapters to guide business decisions. In this chapter, you'll package the
  KPIs you've created into a readable report you can present to managers and
  executives.
