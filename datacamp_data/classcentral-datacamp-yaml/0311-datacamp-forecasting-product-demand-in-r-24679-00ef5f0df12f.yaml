overview: |-
  Forecasting Demand With Time Series

  When it comes to forecasting, time series modeling is a great place to
  start! You need to forecast out the future values of sales demand and a good
  baseline approach would be ARIMA models. In this chapter you'll learn how to
  quickly implement ARIMA models and get good initial forecasts for future
  product demand.

  Components of Demand

  Economic theory has a lot to say about predicting values of demand.
  Obviously, external factors like price, seasonality, and timing of
  promotions will drive some aspects of product demand. In this chapter you'll
  learn about the basics around price elasticity models and how to incorporate
  seasonality and promotion timing factors into our product demand forecasts.

  Blending Regression With Time Series

  Time series models and pricing regressions don't have to be thought of as
  separate approaches to product demand forecasting. They can be combined! In
  this chapter you'll learn about two ways of "combining" the information
  gained in both modeling approaches - transfer functions and forecast
  ensembling.

  Hierarchical Forecasting

  Everything up until this point deals with making individual models for
  forecasting product demand. However, we haven't taken advantage of the fact
  that all of these products form a product hierarchy of sales. Products make
  up regions and regions make up states. How can we ensure that our forecasts
  reconcile correctly up and down the hierarchy? In this chapter you'll learn
  about hierarchical forecasting and how to use it to your advantage in
  forecasting product demand.
