overview: |-
  Exploratory time series data analysis

  This chapter will give you insights on how to organize and visualize time
  series data in R. You will learn several simplifying assumptions that are
  widely used in time series analysis, and common characteristics of financial
  time series.

  Predicting the future

  In this chapter, you will conduct some trend spotting, and learn the white
  noise (WN) model, the random walk (RW) model, and the definition of
  stationary processes.

  Correlation analysis and the autocorrelation function

  In this chapter, you will review the correlation coefficient, use it to
  compare two time series, and also apply it to compare a time series with its
  past, as an autocorrelation. You will discover the autocorrelation function
  (ACF) and practice estimating and visualizing autocorrelations for time
  series data.

  Autoregression

  In this chapter, you will learn the autoregressive (AR) model and several of
  its basic properties. You will also practice simulating and estimating the
  AR model in R, and compare the AR model with the random walk (RW) model.

  A simple moving average

  In this chapter, you will learn the simple moving average (MA) model and
  several of its basic properties. You will also practice simulating and
  estimating the MA model in R, and compare the MA model with the
  autoregressive (AR) model.
