overview: |-
  Univariate exploratory data analysis

  Exploratory data analysis, or EDA, is a fundamental step when doing data
  research. Getting the first insights of your data is easy in Tableau: you’ll
  be creating and interpreting tables, bar plots, histograms, and box plots in
  no time!

  Measures of spread and confidence intervals

  In this more conceptual chapter, you’ll dive deeper into the use of
  different measures of center and spread, and how they should be used in
  Tableau. You’ll learn about the use of the summary card, the difference
  between sample and population, and how variance, standard deviation, and
  confidence intervals can be calculated and visualized.

  Bivariate exploratory data analysis

  It's time to look at two variables at a time. Describing the relationship
  between two variables, or regression, is a great way to spot trends in your
  data. You'll learn how to find the best trend line, describe the trend
  model, and predict future observations, using dinosaur data!

  Forecasting and clustering

  In this last chapter, you’ll explore two more advanced statistical
  techniques: forecasting and clustering. Forecasting helps you detect
  recurring patterns in your time-series data, and can predict how these
  patterns will change in the future. With clustering, you’re able to detect
  patterns in unlabeled data, allowing you to slice and dice your dataset to
  reveal hidden insights.
