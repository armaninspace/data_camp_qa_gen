overview: |-
  Learn how to create pivot tables and quickly organize thousands of data
  points with just a few clicks.

  Why Pivot Tables

  Working with large quantities of data in Google Sheets can be difficult and
  time-consuming. Have you ever wished there was a quick and efficient way to
  organize and evaluate your data within seconds? Pivot Tables are your
  answer!

  Introduction to Pivot Tables

  This course provides a comprehensive introduction to the powerful tool of
  pivot tables for data analysis within Google Sheets. It starts by explaining
  the basics of pivot tables, demonstrating how they can be used to quickly
  organize and summarize large datasets. Through practical examples, you’ll
  understand how to transform thousands of data points into clear and
  actionable insights.

  Using Pivot Tables to conduct real-world data analysis

  You will learn how to customize your pivot table by applying standard
  analyses like sorting, subtotaling, and filtering—as well as more advanced
  statistical analysis like creating calculated fields and counting both
  numerical and text fields.

  Explore real-world applications by analyzing diverse datasets such as the
  average rainfall across multiple US cities, the Top 10 companies of the
  Fortune Global 500, and a selection of films released between 2010 and 2016.

  Mastering custom Pivot Tables

  By the end of the course, you'll have the skills to create your own custom
  pivot tables with datasets of any size.

  Whether for business analysis, academic research, or personal projects,
  you'll leave with the ability to turn raw data into meaningful insights, all
  through the power of Pivot Tables in Google Sheets.
