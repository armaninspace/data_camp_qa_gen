overview: |-
  Gain an introduction to data governance, exploring its meaning, purpose, and
  how to implement a data governance framework.

  Gain an Introduction to Data Governance

  This course provides an introduction to data governance, focused on key
  foundational elements, such as what data governance is, why it is important,
  who needs to be involved, and how to implement a data governance program.

  You’ll discover that data governance isn’t just a “check-the-box” exercise
  but a pivotal method to improve the trust, accuracy, and reliability of your
  data to mitigate risk and generate tangible business value.

  Discover Data Governance Frameworks

  You’ll gain an understanding of types of data governance frameworks,
  including components and key principles, and the importance of data
  management maturity. You’ll also learn about data governance roles and
  responsibilities and how to determine the right operating model to fit
  organizational needs.

  Implement Data Governance Best Practices

  Lastly, you’ll learn how to implement your own data governance program,
  including developing a strategy and roadmap and choosing a technical
  solution. This course is a suitable option for anyone that wants to
  understand more about data governance – no prior experience is required.
syllabus:
  - title: "What is Data Governance, and Why is it Important?"
    summary: |-
      In this chapter, you'll learn what data governance is, why it is
      important, and how data governance can benefit any organization.
  - title: "Governance Frameworks, Principles, and Maturity"
    summary: |-
      A data governance framework provides a blueprint for people,
      technology, and processes should operate to ensure successful data
      governance. Learn about data governance types, components,
      principles, and benefits in this chapter, as well as the importance
      of data management maturity.
  - title: "Governance Roles, Committees, and Operating Models"
    summary: |-
      A successful data governance program requires collaboration from
      several different types of roles in an organization. Learn about
      data governance roles and responsibilities, data governance
      committees, and different types of operating models.
  - title: "Implementing your Data Governance Program"
    summary: |-
      Learn how to implement your own data governance program, from
      conducting maturity assessments to developing strategies and
      roadmaps and choosing a technical solution that fits your
      organization's needs.
