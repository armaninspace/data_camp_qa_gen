overview: |-
  Starting with error handling

  To begin the course, you will learn how to handle errors using the
  TRY...CATCH construct that provides T-SQL. You will study the anatomy of
  errors, and you will learn how to use some functions that can give you
  information about errors.

  Raising, throwing and customizing your errors

  In this chapter, you will deepen your knowledge of handling errors. You will
  learn how to raise errors using RAISERROR and THROW. Additionally, you will
  discover how to customize errors.

  Transactions in SQL Server

  In this chapter, you will be introduced to the concept of transactions. You
  will discover how to commit and rollback them. You will finish by learning
  how to return the number of transactions and their state.

  Controlling the concurrency: Transaction isolation levels

  This chapter defines what concurrency is and how it can affect transactions.
  You will learn exciting concepts like dirty reads, repeatable reads, and
  phantom reads. To avoid or allow this reads, you will explore, one by one,
  the different transaction isolation levels.
