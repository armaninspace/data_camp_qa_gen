overview: |-
  Introduction to Survival Analysis

  What problems does survival analysis solve, and what is censorship? You’ll
  answer these questions as you explore survival analysis data, build survival
  curves, and make basic estimations of survival time.

  Survival Curve Estimation

  In this chapter, you’ll learn how the Kaplan-Meier model works and how to
  fit, visualize, and interpret it. You’ll then apply this model to explore
  how categorical variables affect survival and learn how to supplement your
  analysis using hypothesis testing methods like the log-rank test.

  The Weibull Model

  Discover how to model time-to-event data with parametric models. Learn how
  to use the Weibull model and the Weibull AFT model and what different
  purposes they serve. Use survival regression to make inferences about how
  covariates affect the survival function and learn how to select the best
  survival model for your data.

  The Cox PH Model

  Another chapter, another model! In this final chapter, you'll learn about
  the proportional hazards assumption and the role it plays in fitting and
  interpreting the Cox Proportional Hazards model. You’ll also learn how to
  predict new subjects' survival times using the Cox Proportional Hazards
  model.
