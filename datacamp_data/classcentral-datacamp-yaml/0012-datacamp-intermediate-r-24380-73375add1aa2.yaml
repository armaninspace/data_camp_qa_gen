overview: |-
  Continue your journey to becoming an R ninja by learning about conditional
  statements, loops, and vector functions.

  Intermediate R is the next stop on your journey in mastering the R
  programming language. In this R training, you will learn about conditional
  statements, loops, and functions to power your own R scripts. Next, make
  your R code more efficient and readable using the apply functions. Finally,
  the utilities chapter gets you up to speed with regular expressions in R,
  data structure manipulations, and times and dates. This course will allow
  you to take the next step in advancing your overall knowledge and
  capabilities while programming in R.

  The videos contain live transcripts you can reveal by clicking "Show
  transcript" at the bottom left of the videos.

  The course glossary can be found on the right in the resources section.

  To obtain CPE credits you need to complete the course and reach a score of
  70% on the qualified assessment. You can navigate to the assessment by
  clicking on the CPE credits callout on the right.
syllabus:
  - title: "Conditionals and Control Flow"
    summary: |-
      In this chapter, you'll learn about relational operators for
      comparing R objects, and logical operators like "and" and "or" for
      combining TRUE and FALSE values. Then, you'll use this knowledge to
      build conditional statements.
  - title: Loops
    summary: |-
      Loops can come in handy on numerous occasions. While loops are like
      repeated if statements, the for loop is designed to iterate over all
      elements in a sequence. Learn about them in this chapter.
  - title: Functions
    summary: |-
      Functions are an extremely important concept in almost every
      programming language, and R is no different. Learn what functions
      are and how to use them—then take charge by writing your own
      functions.
  - title: "The apply family"
    summary: |-
      Whenever you're using a for loop, you may want to revise your code
      to see whether you can use the lapply function instead. Learn all
      about this intuitive way of applying a function over a list or a
      vector, and how to use its variants, sapply and vapply.
  - title: Utilities
    summary: |-
      Mastering R programming is not only about understanding its
      programming concepts. Having a solid understanding of a wide range
      of R functions is also important. This chapter introduces you to
      many useful functions for data structure manipulation, regular
      expressions, and working with times and dates.
