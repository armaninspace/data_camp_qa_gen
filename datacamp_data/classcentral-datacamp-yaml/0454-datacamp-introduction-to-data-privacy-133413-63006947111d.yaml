overview: |-
  Gain a clear understanding of data privacy principles and how to implement
  privacy and security processes.

  Learn the Basics of Data Privacy

  What is data privacy, why is it so important, and how does it impact you
  daily? Answer all these questions and more in this course, introducing you
  to the basics of data privacy.

  Discover Why Data Privacy Matters

  This non-technical course focuses on providing a solid foundation of privacy
  principles and relating them with other critical concepts within the
  interconnected data landscape. You’ll start by looking at the relationship
  between security, privacy, and data and why they matter in the modern world.

  Learn Aboud Data Privacy Tools and Processes

  In chapter 2, you’ll then learn about the tools, processes, and frameworks
  that should form a strong privacy strategy. As well as Privacy by Design,
  you’ll explore the importance of data classification, and the components of
  data lifecycle management.

  Explore Data Privacy Laws

  The final chapter of this course will explore the different privacy laws and
  how they affect data use in companies.

  Through hands-on exercises, you’ll learn about the importance of privacy by
  design and additional privacy topics. Data privacy is essential to everyone.
  Start leveling up your data privacy skills and uncover a new way to look at
  the data around you.
