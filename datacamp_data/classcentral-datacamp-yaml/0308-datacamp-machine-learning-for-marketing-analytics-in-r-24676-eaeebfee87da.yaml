overview: |-
  Modeling Customer Lifetime Value with Linear Regression

  How can you decide which customers are most valuable for your business?
  Learn how to model the customer lifetime value using linear regression.

  Logistic Regression for Churn Prevention

  Predicting if a customer will leave your business, or churn, is important
  for targeting valuable customers and retaining those who are at risk. Learn
  how to model customer churn using logistic regression.

  Modeling Time to Reorder with Survival Analysis

  Learn how to model the time to an event using survival analysis. This could
  be the time until next order or until a person churns.

  Reducing Dimensionality with Principal Component Analysis

  CRM data can get very extensive. Each metric you collect could carry some
  interesting information about your customers. But handling a dataset with
  too many variables is difficult. Learn how to reduce the number of variables
  in your data using principal component analysis. Not only does this help to
  get a better understanding of your data. PCA also enables you to condense
  information to single indices and to solve multicollinearity problems in a
  regression analysis with many intercorrelated variables.
