overview: |-
  Summarizing Data

  One of the first steps in data analysis is examining data through
  aggregations. This chapter explores how to create aggregations in SQL
  Server, a common first step in data exploration. You will also clean missing
  data and categorize data into bins with CASE statements.

  Math Functions

  This chapter explores essential math operations such as rounding numbers,
  calculating squares and square roots, and counting records. You will also
  work with dates in this chapter!

  Processing Data in SQL Server

  In this chapter, you will create variables and write while loops to process
  data. You will also write complex queries by using derived tables and common
  table expressions.

  Window Functions

  In the final chapter of this course, you will work with partitions of data
  and window functions to calculate several summary stats and see how easy it
  is to create running totals and compute the mode of numeric columns.
