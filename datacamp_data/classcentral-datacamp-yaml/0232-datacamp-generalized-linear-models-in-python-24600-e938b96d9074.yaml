overview: |-
  Introduction to GLMs

  Review linear models and learn how GLMs are an extension of the linear model
  given different types of response variables. You will also learn the
  building blocks of GLMs and the technical process of fitting a GLM in
  Python.

  Modeling Binary Data

  This chapter focuses on logistic regression. You'll learn about the
  structure of binary data, the logit link function, model fitting, as well as
  how to interpret model coefficients, model inference, and how to assess
  model performance.

  Modeling Count Data

  Here you'll learn about Poisson regression, including the discussion on
  count data, Poisson distribution and the interpretation of the model fit.
  You'll also learn how to overcome problems with overdispersion. Finally,
  you'll get hands-on experience with the process of model visualization.

  Multivariable Logistic Regression

  In this final chapter you'll learn how to increase the complexity of your
  model by adding more than one explanatory variable. You'll practice with the
  problem of multicollinearity, and with treating categorical and interaction
  terms in your model.
