overview: |-
  Importing Data from Flat Files

  Practice using pandas to get just the data you want from flat files, learn
  how to wrangle data types and handle errors, and look into some U.S. tax
  data along the way.

  Importing Data From Excel Files

  Automate data imports from that staple of office life, Excel files. Import
  part or all of a workbook and ensure boolean and datetime data are properly
  loaded, all while learning about how other people are learning to code.

  Importing Data from Databases

  Combine pandas with the powers of SQL to find out just how many problems New
  Yorkers have with their housing. This chapter features introductory SQL
  topics like WHERE clauses, aggregate functions, and basic joins.

  Importing JSON Data and Working with APIs

  Learn how to work with JSON data and web APIs by exploring a public dataset
  and getting cafe recommendations from Yelp. End by learning some techniques
  to combine datasets once they have been loaded into data frames.
