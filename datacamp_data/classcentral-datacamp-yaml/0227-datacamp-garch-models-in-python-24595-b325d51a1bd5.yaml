overview: |-
  GARCH Model Fundamentals

  What are GARCH models, what are they used for, and how can you implement
  them in Python? After completing this first chapter you’ll be able to
  confidently answer all these questions.

  GARCH Model Configuration

  A normal GARCH model is not representative of the real financial data, whose
  distributions frequently exhibit fat tails, skewness, and asymmetric shocks.
  In this chapter, you’ll learn how to define better GARCH models with more
  realistic assumptions. You’ll also learn how to make more sophisticated
  volatility forecasts with rolling window approaches.

  Model Performance Evaluation

  This chapter introduces you to the KISS principle of data science modeling.
  You’ll learn how to use p-values and t-statistics to simplify model
  configuration, use ACF plot, Ljung-Box test to verify model assumptions and
  use likelihood and information criteria for model selection.

  GARCH in Action

  In this final chapter, you’ll learn how to apply the GARCH models you’ve
  previously learned to practical financial world scenarios. You’ll develop
  your skills as you become more familiar with VaR in risk management, dynamic
  covariance in asset allocation, and dynamic Beta in portfolio management.
