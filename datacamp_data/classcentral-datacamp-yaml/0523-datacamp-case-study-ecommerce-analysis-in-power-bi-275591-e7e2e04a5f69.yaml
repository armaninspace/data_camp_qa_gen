overview: |-
  In ecommerce, increasing sales and reducing costs are key. Analyze data from
  an online pet supply company using Power BI.

  For ecommerce businesses, increasing sales and reducing expenses are top
  priorities. In this Power BI case study, you'll investigate a dataset from a
  fictitious online pet supply company called Whiskique.

  Use Your Power BI Skills to Solve Real-World Problems

  First, you’ll analyze the sales dataset to inform the company of who their
  customers are and what purchases they make. You will then use market basket
  analysis to help identify which products are frequently bought together.

  Next, you’ll need to address the fact that shipping costs remain a big
  expense for online retailers. You’ll work on strategies such as shipping
  more of the same product to reduce per-unit costs.

  Analyze The Data and Visualize Your Findings

  As you collate your findings, you’ll create new measures and various
  visualizations in Power BI, such as combination graphs, treemaps, and maps.
  Finally, you'll use filters and parameters to make your graphs dynamic and
  create dashboard-style pages to share your insights.
