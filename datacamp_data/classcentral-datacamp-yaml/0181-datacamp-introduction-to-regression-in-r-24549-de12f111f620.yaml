overview: |-
  Simple Linear Regression

  You’ll learn the basics of this popular statistical model, what regression
  is, and how linear and logistic regressions differ. You’ll then learn how to
  fit simple linear regression models with numeric and categorical explanatory
  variables, and how to describe the relationship between the response and
  explanatory variables using model coefficients.

  Predictions and model objects

  In this chapter, you’ll discover how to use linear regression models to make
  predictions on Taiwanese house prices and Facebook advert clicks. You’ll
  also grow your regression skills as you get hands-on with model objects,
  understand the concept of "regression to the mean", and learn how to
  transform variables in a dataset.

  Assessing model fit

  In this chapter, you’ll learn how to ask questions of your model to assess
  fit. You’ll learn how to quantify how well a linear regression model fits,
  diagnose model problems using visualizations, and understand the leverage
  and influence of each observation used to create the model.

  Simple logistic regression

  Learn to fit logistic regression models. Using real-world data, you’ll
  predict the likelihood of a customer closing their bank account as
  probabilities of success and odds ratios, and quantify model performance
  using confusion matrices.
