overview: |-
  Introduction and review of plotly

  A review of key plotly commands. You will review how to create multiple plot
  types in plotly and how to polish your charts. Additionally, you will create
  static versions of the bubble and line charts that you will animate in the
  next chapter.

  Animating graphics

  In this chapter, you will learn how to implement keyframe animation in
  plotly. You will explore how to create animations, such as Hans Rosling's
  bubble charts, as well as cumulative animations, such as an animation of a
  stock's valuation over time.

  Linking graphics

  When you are exploring unexpected structure in your graphics, it's useful to
  have selections made on one chart update the other. For example, if you are
  exploring clusters observed on a scatterplot, it is useful to have the
  selected cluster update some chart of group membership, such as a jittered
  scatterplot or sets of bar charts. In this chapter, you will learn how to
  link your plotly charts to enable linked brushing. Along the way, you will
  also learn how to add dropdown menus, checkboxes, and sliders to your plotly
  charts, without the need for Shiny.

  Case Study: Space launches

  In the final chapter, you will use your expanded plotly toolkit to explore
  orbital space launches between 1957 and 2018. Along the way, you'll learn
  how to wrangle data to enable cumulative animations without common starting
  points, and hone your understanding of the crosstalk package.
