overview: |-
  Master data visualization in Julia. Learn how to make stunning plots while
  understanding when and how to use them.

  Learn to create stunning data visualizations with Julia, the fast and
  powerful programming language for data science. This course starts with the
  basics of data visualization and gradually introduces advanced techniques.
  By the end, you'll have the skills to create impactful visualizations and
  confidently share your insights with others.

  Tell stories with data

  Begin your exploration by grasping the core concepts of data visualization,
  focusing on learning when and how to construct Julia's different
  visualizations, such as line plots, scatter plots, histograms, box plots,
  and violin plots.

  Bring your plotting skills to the next level

  As you delve deeper into the course, you'll uncover advanced techniques for
  enhancing your visualizations, such as combining multiple plots, customizing
  every aspect of your visualizations, creating plotting recipes, and plotting
  data in DataFrames. By the end of this course, you'll be equipped with a
  versatile skill set in data visualization with Julia, enabling you to create
  stunning visualizations.
syllabus:
  - title: "First steps with Plots.jl"
    summary: |-
      Unlock the power of Julia in this chapter and learn how to create
      stunning, professional-quality data visualizations using the
      Plots.jl package.
  - title: "Histograms, time series and more"
    summary: |-
      Expand your Julia data visualization skills as you delve into
      advanced plot types, including histograms, bar charts, time series
      plots, and box and violin plots.
  - title: "Customizing Julia Plots"
    summary: |-
      Master the art of data visualization customization! Discover how to
      wield themes, manipulate plot attributes, utilize color palettes,
      arrange multiple plots in grids with layouts, and create your series
      recipes. With these skills, you'll have the power to craft stunning
      and highly tailored visualizations to convey impactful insights.
  - title: "Plotting Data in DataFrames"
    summary: |-
      Learn to visualize data in DataFrames, using data manipulation tools
      for these data structures. Delve into multi-dimensional views and
      grid-based layouts for more effective data representation. Elevate
      your data storytelling and unlock new insights in your datasets!
