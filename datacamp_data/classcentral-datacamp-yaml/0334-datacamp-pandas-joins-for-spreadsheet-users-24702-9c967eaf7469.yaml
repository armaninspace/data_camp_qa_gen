overview: |-
  Introduction to joining data

  In this chapter, we'll build a foundation for using pandas to join data.
  You'll learn about the types of joins and how pandas can improve your
  effectiveness and productivity.

  VLOOKUP-style joins

  In this chapter, you'll learn how to use pandas for joining data in a way
  similar to using VLOOKUP formulas in a spreadsheet. You'll learn about three
  types of joins and then focus on the first type, one-to-one joins.

  One-to-many joins

  In this chapter, we'll focus on one-to-many relationships. You'll practice
  identifying the relationship of key columns and joining data frames by
  column. You'll also learn how to join two or more data frames based on their
  indices.

  Advanced joins

  In the final chapter, you'll learn advanced joining techniques to use when
  faced with challenging data. You'll be presented with a challenge of your
  own in the form of a case study that tests your skills.
