overview: |-
  Introduction

  This chapter introduces some key concepts of support vector machines through
  a simple 1-dimensional example. Students are also walked through the
  creation of a linearly separable dataset that is used in the subsequent
  chapter.

  Support Vector Classifiers - Linear Kernels

  Introduces students to the basic concepts of support vector machines by
  applying the svm algorithm to a dataset that is linearly separable. Key
  concepts are illustrated through ggplot visualisations that are built from
  the outputs of the algorithm and the role of the cost parameter is
  highlighted via a simple example. The chapter closes with a section on how
  the algorithm deals with multiclass problems.

  Polynomial Kernels

  Provides an introduction to polynomial kernels via a dataset that is
  radially separable (i.e. has a circular decision boundary). After
  demonstrating the inadequacy of linear kernels for this dataset, students
  will see how a simple transformation renders the problem linearly separable
  thus motivating an intuitive discussion of the kernel trick. Students will
  then apply the polynomial kernel to the dataset and tune the resulting
  classifier.

  Radial Basis Function Kernels

  Builds on the previous three chapters by introducing the highly flexible
  Radial Basis Function (RBF) kernel. Students will create a "complex" dataset
  that shows up the limitations of polynomial kernels. Then, following an
  intuitive motivation for the RBF kernel, students see how it addresses the
  shortcomings of the other kernels discussed in this course.
