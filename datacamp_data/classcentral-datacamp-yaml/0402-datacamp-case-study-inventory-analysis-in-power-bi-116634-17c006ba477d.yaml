overview: |-
  This Power BI case study follows a real-world business use case on tackling
  inventory analysis using DAX and visualizations.

  Apply Your Skills with a Power BI Case Study

  Looking for a way to challenge what you have learned in Power BI? This case
  study can help you be prepared to tackle real-world problems in the field of
  inventory analysis.

  You’ll analyze a dataset from a wonderful fictitious company named
  WarmeHands Inc.

  Deep-dive into Inventory Management

  As with many retailers, they want to investigate possible improvements in
  inventory management and purchases, but they need some help. Here is where
  you come to the rescue. But as you will see, in a real-world case, not
  everything is perfect.

  Utilize Power Query for Data Cleaning

  You will start using some Power Query for cleaning and exploring the data to
  verify everything makes sense. Next, you’ll work with some manipulations and
  intermediate DAX formulas for analyzing the clean information to obtain
  focused insights. Finally, you’ll finish by creating some attractive yet
  informative report pages.

  By the time you’re finished, you’ll be more confident performing an
  inventory analysis using Power BI.
