overview: |-
  Probability and Sampling Distributions

  This chapter kicks the course off by reviewing conditional probabilities,
  Bayes' theorem, and central limit theorem. Along the way, you will learn how
  to handle questions that work with commonly referenced probability
  distributions.

  Exploratory Data Analysis

  In this chapter, you will prepare for statistical concepts related to
  exploratory data analysis. The topics include descriptive statistics,
  dealing with categorical variables, and relationships between variables. The
  exercises will prepare you for an analytical assessment or stats-based
  coding question.

  Statistical Experiments and Significance Testing

  Prepare to dive deeper into crucial concepts regarding experiments and
  testing by reviewing confidence intervals, hypothesis testing, multiple
  tests, and the role that power and sample size play. We'll also discuss
  types of errors, and what they mean in practice.

  Regression and Classification

  Wrapping up, we'll address concepts related closely to regression and
  classification models. The chapter begins by reviewing fundamental machine
  learning algorithms and quickly ramps up to model evaluation, dealing with
  special cases, and the bias-variance tradeoff.
