overview: |-
  In this Power BI case study you’ll play the role of a junior trader,
  analyzing mortgage trading and enhancing your data modeling and financial
  analysis skills.

  Explore the Financial System with Power BI

  In this Power BI case study, you will play the part of a newly hired junior
  trader on a trading desk for a mortgage originator. Enjoy this fast-paced
  and challenging case study as you learn the ins and outs of the financial
  system.

  Play the Role of a Junior Trader

  The flow of money through our economy happens on your desk as it trickles
  down from big investment banks to your lending firm to individual borrowers
  – and you’re the one making it happen.

  Use Your Power BI Skills to Gain Insights

  You will identify a population of mortgages to trade, evaluate each mortgage
  and each bid received from prospective buyers, and finally execute a trade.
  By the end of this case study, you will have sharpened your data modeling,
  DAX, and financial analysis skills, and you will have experienced a unique
  perspective on the banking industry.
