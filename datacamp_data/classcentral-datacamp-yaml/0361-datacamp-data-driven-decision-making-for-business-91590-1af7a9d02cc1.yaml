overview: |-
  Data-Driven Decision-Making Framework

  In this chapter, you’ll get familiar with the data-driven decision
  framework. You’ll learn more about different types of data analysis and
  their objectives. By the end, you’ll be able to see where each decision fits
  within the framework.

  Applying Data to Inform Marketing

  Let’s apply the data-driven decision in a marketing context. You'll use data
  to optimize ad spend, identify arbitrage opportunities for website traffic,
  and even how to forecast new product launches with limited but relevant
  data.

  Spotting Finance Opportunities With Data

  Learning how to use data to inform decisions in finance can be satisfying
  and profitable. In this chapter, you'll review investment opportunities
  using data in consumer credit, real estate, and even in a non-traditional
  market of collectibles.

  Data-Driven Business Operations

  In the final chapter, you'll apply data to create a total addressable market
  calculation for a startup, learn about supply and demand curves used for
  staffing, and how to spot customer-driven areas for improvement. This will
  provide you with practical experience of how to identify optimization
  opportunities and support existing business operations.
