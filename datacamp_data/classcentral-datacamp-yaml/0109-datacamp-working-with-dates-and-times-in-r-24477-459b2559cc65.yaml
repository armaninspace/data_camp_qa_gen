overview: |-
  Dates and Times in R

  R doesn't know something is a date or time unless you tell it. In this
  chapter you'll learn about some of the ways R stores dates and times by
  exploring how often R versions are released, and how quickly people download
  them. You'll also get a sneak peek at what you'll learn in the following
  chapters.

  Parsing and Manipulating Dates and Times with lubridate

  Dates and times come in a huge assortment of formats, so your first hurdle
  is often to parse the format you have into an R datetime. This chapter
  teaches you to import dates and times with the lubridate package. You'll
  also learn how to extract parts of a datetime. You'll practice by exploring
  the weather in R's birthplace, Auckland NZ.

  Arithmetic with Dates and Times

  Getting datetimes into R is just the first step. Now that you know how to
  parse datetimes, you need to learn how to do calculations with them. In this
  chapter, you'll learn the different ways of representing spans of time with
  lubridate and how to leverage them to do arithmetic on datetimes. By the end
  of the chapter, you'll have calculated how long it's been since the first
  man stepped on the moon, generated sequences of dates to help schedule
  reminders, calculated when an eclipse occurs, and explored the reigns of
  monarch's of England (and which ones might have seen Halley's comet!).

  Problems in practice

  You now know most of what you need to tackle data that includes dates and
  times, but there are a few other problems you might encounter in practice.
  In this final chapter you'll learn a little more about these problems by
  returning to some of the earlier data examples and learning how to handle
  time zones, deal with times when you don't care about dates, parse dates
  quickly, and output dates and times.
