overview: |-
  What is Survival Analysis?

  In the first chapter, we introduce the concept of survival analysis, explain
  the importance of this topic, and provide a quick introduction to the theory
  behind survival curves. We discuss why special methods are needed when
  dealing with time-to-event data and introduce the concept of censoring. We
  also discuss how we describe the distribution of the elapsed time until an
  event.

  Estimation of survival curves

  In this chapter, we will look into different methods of estimating survival
  curves. We will discuss the Kaplan-Meier estimate and the Weibull model as
  tools for survival curve estimation and learn how to communicate those
  results through visualization.

  The Weibull model

  In this chapter, we will learn how to estimate and visualize a Weibull model
  to learn about the effects of covariates on the time-to-event outcome.

  The Cox Model

  In the last chapter, we learn how to compute and interpret Cox models to
  understand why they are useful and how they differ from Weibull models.
