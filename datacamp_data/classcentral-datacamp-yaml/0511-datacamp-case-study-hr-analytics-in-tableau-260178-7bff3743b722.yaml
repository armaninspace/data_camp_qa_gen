overview: |-
  Preparing Data and EDA

  In this chapter, you’ll start by bringing all your data into Tableau and
  building relationships between tables. Once your data is ready, you’ll start
  by rolling your sleeves up and doing some initial exploratory data analysis
  on general HR trends.

  Analyzing Demographics and Performance

  This chapter is about using your Tableau skills to build custom visuals that
  you can use throughout your dashboard. Atlas Labs would like some answers on
  its employee demographics and performance. Luckily, they have you on their
  team as a data analyst to help them explore their data further.

  Bringing It All Together

  It’s almost time to deliver your report to the key stakeholders at Atlas
  Labs. In this final chapter, you’ll be focusing on delivering insights on
  attrition and what factors affect employee retention. Finally, you’ll be
  cleaning up the overall layout of the dashboard to create a user-friendly,
  clean, and branded experience.
